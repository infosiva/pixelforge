<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a2e"/>
      <stop offset="100%" stop-color="#0a2e1a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="15" cy="15" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="55" cy="8" r="1.5" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="290" cy="12" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="310" cy="35" r="1.5" fill="#e2e8f0" opacity="0.3"/>
  <!-- Falling word bubbles -->
  <rect x="20" y="25" width="80" height="26" rx="13" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="43" font-family="monospace" font-size="13" fill="#93c5fd" text-anchor="middle">PERRO</text>
  <rect x="120" y="10" width="80" height="26" rx="13" fill="#3b1e5f" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="28" font-family="monospace" font-size="13" fill="#c4b5fd" text-anchor="middle">CHIEN</text>
  <rect x="215" y="30" width="90" height="26" rx="13" fill="#1e3b1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="48" font-family="monospace" font-size="13" fill="#86efac" text-anchor="middle">犬 (INU)</text>
  <!-- Mid bubbles -->
  <rect x="30" y="75" width="90" height="26" rx="13" fill="#3b1e1e" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  <text x="75" y="93" font-family="monospace" font-size="13" fill="#fca5a5" text-anchor="middle">HUND</text>
  <rect x="180" y="68" width="80" height="26" rx="13" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="220" y="86" font-family="monospace" font-size="13" fill="#7dd3fc" text-anchor="middle">GATO</text>
  <!-- Question highlight -->
  <rect x="85" y="115" width="150" height="36" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="129" font-family="monospace" font-size="10" fill="#fbbf24" text-anchor="middle">TRANSLATE:</text>
  <text x="160" y="145" font-family="monospace" font-size="16" fill="#fde68a" text-anchor="middle" font-weight="bold">DOG</text>
  <!-- Title -->
  <text x="160" y="172" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle" opacity="0.8">VOCAB BLASTER</text>
</svg>
