<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#0f172a" stroke-width="1">
    <line x1="20" y1="0" x2="20" y2="180"/>
    <line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/>
    <line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/>
    <line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/>
    <line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/>
    <line x1="0" y1="20" x2="320" y2="20"/>
    <line x1="0" y1="40" x2="320" y2="40"/>
    <line x1="0" y1="60" x2="320" y2="60"/>
    <line x1="0" y1="80" x2="320" y2="80"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="140" x2="320" y2="140"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
  </g>
  <!-- Snake body — neon green segments -->
  <!-- Tail end -->
  <rect x="21" y="101" width="18" height="18" rx="3" fill="#064e3b" stroke="#059669" stroke-width="1"/>
  <rect x="41" y="101" width="18" height="18" rx="3" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <rect x="61" y="101" width="18" height="18" rx="3" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <rect x="81" y="101" width="18" height="18" rx="3" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <!-- Turn up -->
  <rect x="81" y="81" width="18" height="18" rx="3" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <rect x="81" y="61" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <!-- Turn right -->
  <rect x="101" y="61" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <rect x="121" y="61" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <rect x="141" y="61" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <!-- Turn down -->
  <rect x="141" y="81" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <rect x="141" y="101" width="18" height="18" rx="3" fill="#047857" stroke="#34d399" stroke-width="1.5"/>
  <!-- Turn right again -->
  <rect x="161" y="101" width="18" height="18" rx="3" fill="#059669" stroke="#6ee7b7" stroke-width="2"/>
  <rect x="181" y="101" width="18" height="18" rx="3" fill="#059669" stroke="#6ee7b7" stroke-width="2"/>
  <!-- Head -->
  <rect x="201" y="101" width="18" height="18" rx="4" fill="#10b981" stroke="#a7f3d0" stroke-width="2" filter="url(#glow)"/>
  <circle cx="207" cy="107" r="2" fill="white"/>
  <circle cx="213" cy="107" r="2" fill="white"/>
  <!-- Food (pink orb) -->
  <circle cx="250" cy="70" r="9" fill="#db2777" stroke="#f9a8d4" stroke-width="2" filter="url(#glow)"/>
  <circle cx="247" cy="67" r="3" fill="#fce7f3" opacity="0.5"/>
  <!-- Bonus orb -->
  <circle cx="70" cy="150" r="7" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <!-- Score -->
  <text x="160" y="170" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle" opacity="0.9">SCORE: 1240 — NEON SNAKE</text>
</svg>
