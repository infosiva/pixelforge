<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="explo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="60%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Nebula -->
  <ellipse cx="160" cy="90" rx="120" ry="70" fill="#312e81" opacity="0.15"/>
  <!-- Stars -->
  <circle cx="20" cy="15" r="1" fill="white" opacity="0.7"/>
  <circle cx="60" cy="35" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="10" r="1" fill="white" opacity="0.6"/>
  <circle cx="160" cy="20" r="0.5" fill="white" opacity="0.8"/>
  <circle cx="220" cy="8" r="1" fill="white" opacity="0.5"/>
  <circle cx="280" cy="25" r="0.5" fill="white" opacity="0.7"/>
  <circle cx="305" cy="55" r="1" fill="white" opacity="0.4"/>
  <!-- Boss ship -->
  <polygon points="160,15 200,55 160,45 120,55" fill="#4c1d95" stroke="#7c3aed" stroke-width="2"/>
  <rect x="145" y="45" width="30" height="12" rx="2" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1"/>
  <circle cx="160" cy="51" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <!-- Boss laser -->
  <line x1="160" y1="57" x2="160" y2="130" stroke="#c026d3" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <!-- Enemy bullets -->
  <circle cx="110" cy="70" r="3" fill="#f43f5e" filter="url(#glow)"/>
  <circle cx="210" cy="80" r="3" fill="#f43f5e" filter="url(#glow)"/>
  <circle cx="85" cy="90" r="3" fill="#f43f5e" filter="url(#glow)"/>
  <!-- Player ship -->
  <polygon points="160,170 140,148 180,148" fill="#06b6d4" stroke="#67e8f9" stroke-width="2" filter="url(#glow)"/>
  <polygon points="160,170 155,158 165,158" fill="#f97316"/>
  <!-- Player bullets -->
  <rect x="157" y="120" width="6" height="14" rx="3" fill="#38bdf8" filter="url(#glow)"/>
  <rect x="157" y="100" width="6" height="14" rx="3" fill="#38bdf8" filter="url(#glow)" opacity="0.7"/>
  <!-- Explosion -->
  <circle cx="85" cy="90" r="16" fill="url(#explo)" opacity="0.7"/>
  <!-- Power-up -->
  <rect x="230" y="95" width="18" height="18" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="239" y="108" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">⚡</text>
  <!-- HUD -->
  <text x="8" y="172" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.8">LIVES: ♥♥♥</text>
  <text x="250" y="172" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.8">BOSS!</text>
  <text x="160" y="12" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle" opacity="0.7">GALACTIC ASSAULT</text>
</svg>
