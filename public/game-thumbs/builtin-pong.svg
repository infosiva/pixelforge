<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#000"/>
  <!-- center line dashes -->
  <line x1="100" y1="0" x2="100" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="8,8"/>
  <!-- paddles -->
  <rect x="16" y="50" width="10" height="50" rx="5" fill="#a78bfa"/>
  <rect x="174" y="60" width="10" height="50" rx="5" fill="#f472b6"/>
  <!-- ball -->
  <circle cx="110" cy="72" r="8" fill="#fff"/>
  <circle cx="110" cy="72" r="8" fill="url(#ball-glow)" opacity="0.6"/>
  <!-- score -->
  <text x="72" y="30" font-size="28" font-weight="900" text-anchor="middle" fill="#a78bfa" font-family="monospace">3</text>
  <text x="128" y="30" font-size="28" font-weight="900" text-anchor="middle" fill="#f472b6" font-family="monospace">2</text>
  <!-- trail -->
  <circle cx="100" cy="78" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="90" cy="82" r="3" fill="rgba(255,255,255,0.15)"/>
  <defs>
    <radialGradient id="ball-glow"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
</svg>
