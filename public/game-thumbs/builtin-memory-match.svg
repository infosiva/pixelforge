<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#0a0a1a"/>
  <!-- grid of cards 4x3 -->
  <!-- row 1 -->
  <rect x="10" y="14" width="40" height="40" rx="6" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <text x="30" y="40" font-size="20" text-anchor="middle">⭐</text>
  <rect x="55" y="14" width="40" height="40" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="75" y="40" font-size="20" text-anchor="middle">🌙</text>
  <rect x="100" y="14" width="40" height="40" rx="6" fill="#1e3a1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="40" font-size="20" text-anchor="middle">⭐</text>
  <rect x="145" y="14" width="40" height="40" rx="6" fill="#1a0a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="165" y="40" font-size="20" text-anchor="middle">🔥</text>
  <!-- row 2 -->
  <rect x="10" y="60" width="40" height="40" rx="6" fill="#0a1628" stroke="#2563eb" stroke-width="1.5"/>
  <text x="30" y="86" font-size="20" text-anchor="middle">💎</text>
  <rect x="55" y="60" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- face down -->
  <rect x="58" y="63" width="34" height="34" rx="4" fill="url(#card-back)"/>
  <text x="75" y="84" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="100" y="60" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="103" y="63" width="34" height="34" rx="4" fill="url(#card-back)"/>
  <text x="120" y="84" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="145" y="60" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="148" y="63" width="34" height="34" rx="4" fill="url(#card-back)"/>
  <text x="165" y="84" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.2)">?</text>
  <!-- row 3 -->
  <rect x="10" y="106" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="13" y="109" width="34" height="34" rx="4" fill="url(#card-back)"/>
  <text x="30" y="130" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="55" y="106" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="58" y="109" width="34" height="34" rx="4" fill="url(#card-back)"/>
  <text x="75" y="130" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="100" y="106" width="40" height="40" rx="6" fill="#1e3a1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="132" font-size="20" text-anchor="middle">💎</text>
  <rect x="145" y="106" width="40" height="40" rx="6" fill="#1a0a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="165" y="132" font-size="20" text-anchor="middle">🔥</text>
  <defs>
    <linearGradient id="card-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
</svg>
