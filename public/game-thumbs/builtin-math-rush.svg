<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.15">
    <circle cx="20" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="60" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="100" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="140" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="180" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="220" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="260" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="300" cy="20" r="1" fill="#a78bfa"/>
    <circle cx="20" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="60" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="100" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="140" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="180" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="220" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="260" cy="60" r="1" fill="#a78bfa"/>
    <circle cx="300" cy="60" r="1" fill="#a78bfa"/>
  </g>
  <!-- Timer arc -->
  <circle cx="160" cy="85" r="55" fill="none" stroke="#312e81" stroke-width="6"/>
  <circle cx="160" cy="85" r="55" fill="none" stroke="#6d28d9" stroke-width="6" stroke-dasharray="276 345" stroke-dashoffset="69" stroke-linecap="round" transform="rotate(-90 160 85)"/>
  <!-- Center math -->
  <text x="160" y="72" font-family="monospace" font-size="22" font-weight="bold" fill="#f9a8d4" text-anchor="middle" filter="url(#glow)">8 × 7</text>
  <text x="160" y="100" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">= ?</text>
  <!-- Answer buttons -->
  <rect x="40" y="138" width="50" height="28" rx="6" fill="#16213e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="65" y="157" font-family="monospace" font-size="14" fill="#60a5fa" text-anchor="middle">42</text>
  <rect x="100" y="138" width="50" height="28" rx="6" fill="#16213e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="125" y="157" font-family="monospace" font-size="14" fill="#a78bfa" text-anchor="middle">54</text>
  <rect x="160" y="138" width="50" height="28" rx="6" fill="#1a3a1a" stroke="#16a34a" stroke-width="2"/>
  <text x="185" y="157" font-family="monospace" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="bold">56</text>
  <rect x="220" y="138" width="50" height="28" rx="6" fill="#16213e" stroke="#dc2626" stroke-width="1.5"/>
  <text x="245" y="157" font-family="monospace" font-size="14" fill="#f87171" text-anchor="middle">63</text>
  <!-- Title -->
  <text x="160" y="16" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle" opacity="0.8">MATH RUSH</text>
  <!-- Streak -->
  <text x="285" y="50" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">🔥×5</text>
</svg>
