<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Brick rows -->
  <!-- Row 1 red -->
  <rect x="10" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="57" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="104" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="151" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="198" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="245" y="15" width="42" height="14" rx="2" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Row 2 orange -->
  <rect x="10" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5"/>
  <rect x="57" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5"/>
  <rect x="104" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5"/>
  <!-- Exploded -->
  <rect x="151" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5" opacity="0.2"/>
  <rect x="198" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5"/>
  <rect x="245" y="33" width="42" height="14" rx="2" fill="#92400e" stroke="#f97316" stroke-width="1.5"/>
  <!-- Row 3 yellow -->
  <rect x="10" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <rect x="57" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <!-- Exploded -->
  <rect x="104" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5" opacity="0.2"/>
  <rect x="151" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <rect x="198" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <rect x="245" y="51" width="42" height="14" rx="2" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <!-- Row 4 green -->
  <rect x="10" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="57" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="104" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="151" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="198" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5" opacity="0.25"/>
  <rect x="245" y="69" width="42" height="14" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Ball -->
  <circle cx="170" cy="105" r="7" fill="#e2e8f0" stroke="#f1f5f9" stroke-width="1" filter="url(#glow)"/>
  <!-- Power-up falling -->
  <rect x="140" y="78" width="16" height="12" rx="3" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="148" y="88" font-family="monospace" font-size="8" fill="#e9d5ff" text-anchor="middle">×3</text>
  <!-- Paddle -->
  <rect x="110" y="160" width="90" height="12" rx="6" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <!-- Paddle highlight -->
  <rect x="125" y="162" width="40" height="4" rx="2" fill="#93c5fd" opacity="0.4"/>
  <!-- Lives -->
  <circle cx="270" cy="155" r="5" fill="#e2e8f0"/>
  <circle cx="285" cy="155" r="5" fill="#e2e8f0"/>
  <circle cx="300" cy="155" r="5" fill="#e2e8f0"/>
  <!-- Title / score -->
  <text x="8" y="175" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">SCORE: 7400</text>
  <text x="200" y="175" font-family="monospace" font-size="9" fill="#60a5fa" opacity="0.8">BLOCK BLITZ</text>
</svg>
