<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#0a0a1a"/>
  <!-- board -->
  <rect x="30" y="20" width="140" height="120" rx="4" fill="#1a1a2e"/>
  <!-- checkerboard 4x4 sample -->
  <rect x="30" y="20" width="35" height="30" fill="#e8d5b0"/>
  <rect x="65" y="20" width="35" height="30" fill="#7c5535"/>
  <rect x="100" y="20" width="35" height="30" fill="#e8d5b0"/>
  <rect x="135" y="20" width="35" height="30" fill="#7c5535"/>
  <rect x="30" y="50" width="35" height="30" fill="#7c5535"/>
  <rect x="65" y="50" width="35" height="30" fill="#e8d5b0"/>
  <rect x="100" y="50" width="35" height="30" fill="#7c5535"/>
  <rect x="135" y="50" width="35" height="30" fill="#e8d5b0"/>
  <rect x="30" y="80" width="35" height="30" fill="#e8d5b0"/>
  <rect x="65" y="80" width="35" height="30" fill="#7c5535"/>
  <rect x="100" y="80" width="35" height="30" fill="#e8d5b0"/>
  <rect x="135" y="80" width="35" height="30" fill="#7c5535"/>
  <rect x="30" y="110" width="35" height="30" fill="#7c5535"/>
  <rect x="65" y="110" width="35" height="30" fill="#e8d5b0"/>
  <rect x="100" y="110" width="35" height="30" fill="#7c5535"/>
  <rect x="135" y="110" width="35" height="30" fill="#e8d5b0"/>
  <!-- pieces -->
  <text x="40" y="44" font-size="22" text-anchor="middle">♜</text>
  <text x="82" y="44" font-size="22" text-anchor="middle" fill="#ccc">♞</text>
  <text x="152" y="44" font-size="22" text-anchor="middle">♝</text>
  <text x="47" y="134" font-size="22" text-anchor="middle" fill="#fff">♙</text>
  <text x="117" y="74" font-size="22" text-anchor="middle" fill="#fff">♔</text>
  <text x="117" y="104" font-size="22" text-anchor="middle">♚</text>
  <!-- glow -->
  <circle cx="100" cy="80" r="60" fill="url(#cg)" opacity="0.3"/>
  <defs><radialGradient id="cg" cx="50%" cy="50%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
</svg>
