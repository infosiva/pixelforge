<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Card Battle</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0010; font-family:'Segoe UI',sans-serif; color:#fff; overflow:hidden; user-select:none; }
  canvas { display:none; }
  #game {
    width:100vw; height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(236,72,153,0.2) 0%, transparent 60%),
                #07060f;
  }
  #ui { width:100%; max-width:600px; padding:12px; position:relative; }

  /* HP bars */
  #status-row {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px; gap:8px;
  }
  .hp-block { flex:1; }
  .hp-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
  .hp-bar-wrap { background:rgba(255,255,255,0.08); border-radius:99px; height:8px; overflow:hidden; }
  .hp-bar { height:100%; border-radius:99px; transition:width 0.4s ease; }
  #player-hp-bar { background:linear-gradient(90deg,#7c3aed,#a78bfa); }
  #enemy-hp-bar  { background:linear-gradient(90deg,#ef4444,#f87171); }
  .hp-val { font-size:13px; font-weight:800; margin-top:3px; }
  #turn-badge {
    padding:4px 12px; border-radius:99px; font-size:10px; font-weight:900;
    letter-spacing:0.1em; text-transform:uppercase;
    background:rgba(124,58,237,0.2); border:1px solid rgba(167,139,250,0.3);
    color:#c4b5fd; white-space:nowrap;
  }

  /* Arena */
  #arena {
    display:flex; justify-content:space-between; align-items:center;
    gap:12px; margin-bottom:12px;
    background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06);
    border-radius:16px; padding:16px;
    min-height:100px; position:relative;
  }
  .fighter {
    font-size:52px; filter:drop-shadow(0 0 20px rgba(167,139,250,0.5));
    transition:transform 0.15s; position:relative;
  }
  .fighter.attack { animation:punch 0.3s ease; }
  @keyframes punch { 0%{transform:scale(1)} 40%{transform:scale(1.3) translateX(20px)} 100%{transform:scale(1)} }
  .fighter.hurt { animation:hurt 0.4s ease; }
  @keyframes hurt { 0%{transform:scale(1)} 20%{transform:scale(0.85)} 60%{transform:translateX(-12px)} 100%{transform:scale(1)} }
  #vs-badge {
    font-size:11px; font-weight:900; color:rgba(255,255,255,0.2);
    letter-spacing:0.1em;
  }
  #effect-text {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    font-size:15px; font-weight:900; color:#fbbf24; text-shadow:0 0 12px #fbbf24;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
    white-space:nowrap;
  }
  #effect-text.show { opacity:1; }

  /* Log */
  #log {
    background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.06);
    border-radius:10px; padding:8px 12px; min-height:38px;
    font-size:12px; color:rgba(255,255,255,0.55);
    margin-bottom:12px; text-align:center; line-height:1.6;
  }

  /* Cards */
  #hand {
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
    margin-bottom:10px;
  }
  .card {
    width:90px; min-height:110px; border-radius:12px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding:10px 8px; border:1px solid rgba(255,255,255,0.12);
    background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    transition:transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position:relative; overflow:hidden;
  }
  .card:hover:not(.disabled) {
    transform:translateY(-8px) scale(1.06);
    box-shadow:0 16px 40px rgba(0,0,0,0.5), 0 0 20px var(--glow,rgba(124,58,237,0.4));
    border-color:rgba(255,255,255,0.3);
    z-index:10;
  }
  .card.disabled { opacity:0.35; cursor:not-allowed; }
  .card-icon { font-size:26px; line-height:1; }
  .card-name { font-size:9px; font-weight:800; color:rgba(255,255,255,0.7); text-align:center; letter-spacing:0.04em; }
  .card-power {
    font-size:18px; font-weight:900; color:#fff;
    text-shadow:0 0 8px var(--glow,rgba(124,58,237,0.8));
  }
  .card-type { font-size:8px; color:rgba(255,255,255,0.3); font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }

  /* type colors */
  .type-atk  { --glow:#f87171; }
  .type-def  { --glow:#60a5fa; }
  .type-heal { --glow:#4ade80; }
  .type-burn { --glow:#fb923c; }
  .type-crit { --glow:#fbbf24; }

  /* Enemy hand preview */
  #enemy-hand {
    display:flex; gap:6px; justify-content:center; margin-bottom:10px;
  }
  .enemy-card {
    width:30px; height:40px; border-radius:6px;
    background:linear-gradient(145deg,#1a0840,#0a0420);
    border:1px solid rgba(124,58,237,0.2);
  }

  /* Overlay */
  #overlay {
    position:fixed; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.8); z-index:100; flex-direction:column; gap:16px;
  }
  #overlay.show { display:flex; }
  #overlay h2 { font-size:36px; font-weight:900; letter-spacing:-0.02em; }
  #overlay p { color:rgba(255,255,255,0.5); font-size:14px; }
  #restart-btn {
    padding:14px 32px; border-radius:12px; border:none; cursor:pointer;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    color:#fff; font-size:15px; font-weight:800;
    box-shadow:0 0 28px rgba(124,58,237,0.4);
    transition:transform 0.2s;
  }
  #restart-btn:hover { transform:translateY(-2px); }

  @media (max-width:480px) {
    .card { width:72px; min-height:90px; padding:8px 6px; }
    .card-icon { font-size:20px; }
    .card-power { font-size:15px; }
    .fighter { font-size:40px; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="ui">
    <div id="status-row">
      <div class="hp-block">
        <div class="hp-label">🧙 You</div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="player-hp-bar" style="width:100%"></div></div>
        <div class="hp-val" id="player-hp-val">30 / 30</div>
      </div>
      <div id="turn-badge">YOUR TURN</div>
      <div class="hp-block" style="text-align:right">
        <div class="hp-label">🤖 Enemy</div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="enemy-hp-bar" style="width:100%"></div></div>
        <div class="hp-val" id="enemy-hp-val">24 / 24</div>
      </div>
    </div>

    <div id="arena">
      <span class="fighter" id="player-fig">🧙</span>
      <span id="vs-badge">VS</span>
      <span class="fighter" id="enemy-fig">🤖</span>
      <div id="effect-text">Critical Hit!</div>
    </div>

    <div id="log">Draw a card and play it to attack or defend!</div>

    <div id="enemy-hand"></div>
    <div id="hand"></div>

  </div>
</div>

<div id="overlay">
  <h2 id="result-title">Victory!</h2>
  <p id="result-sub">Enemy defeated!</p>
  <button id="restart-btn">Play Again</button>
</div>

<script>
const CARDS = [
  { name:'Fireball',   icon:'🔥', type:'atk',  power:6,  desc:'Direct damage' },
  { name:'Ice Bolt',   icon:'❄️', type:'atk',  power:5,  desc:'Direct damage' },
  { name:'Shield',     icon:'🛡️', type:'def',  power:5,  desc:'Block damage'  },
  { name:'Heal',       icon:'💚', type:'heal', power:5,  desc:'Restore HP'    },
  { name:'Crit Slash', icon:'⚔️', type:'crit', power:8,  desc:'Double damage 50%' },
  { name:'Poison',     icon:'☠️', type:'burn', power:3,  desc:'+3 next turn'  },
  { name:'Lightning',  icon:'⚡', type:'atk',  power:7,  desc:'Direct damage' },
  { name:'Stone Wall', icon:'🪨', type:'def',  power:7,  desc:'Block damage'  },
  { name:'Blood Pact', icon:'🩸', type:'heal', power:7,  desc:'Restore HP'    },
  { name:'Meteor',     icon:'☄️', type:'atk',  power:9,  desc:'Big damage'    },
  { name:'Mirror',     icon:'🪞', type:'def',  power:4,  desc:'Block + reflect 2' },
  { name:'Dragon',     icon:'🐉', type:'crit', power:10, desc:'Dragon power'  },
]
const TYPE_CLASS = { atk:'type-atk', def:'type-def', heal:'type-heal', burn:'type-burn', crit:'type-crit' }

const ENEMIES = [
  { emoji:'🤖', name:'Bot', hp:24 },
  { emoji:'👹', name:'Demon', hp:28 },
  { emoji:'🧟', name:'Zombie', hp:22 },
  { emoji:'🐲', name:'Dragon', hp:35 },
]

let state = {}

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a }
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5) }

function drawCards(n=1){
  const drawn = []
  for(let i=0;i<n;i++){
    if(state.deck.length===0) state.deck = shuffle([...CARDS,...CARDS,...CARDS])
    drawn.push({...state.deck.pop()})
  }
  return drawn
}

function initGame(){
  const enemy = ENEMIES[rand(0,ENEMIES.length-1)]
  state = {
    playerHp:30, playerMaxHp:30,
    enemyHp:enemy.hp, enemyMaxHp:enemy.hp,
    enemyEmoji:enemy.emoji, enemyName:enemy.name,
    deck: shuffle([...CARDS,...CARDS,...CARDS]),
    hand:[],
    enemyHand:[],
    playerShield:0, enemyShield:0,
    playerPoison:0, enemyPoison:0,
    turn:'player',
    busy:false,
  }
  state.hand = drawCards(4)
  state.enemyHand = drawCards(3)
  document.getElementById('enemy-fig').textContent = enemy.emoji
  document.getElementById('overlay').classList.remove('show')
  render()
  setLog('Your turn! Play a card.')
}

function setLog(msg){ document.getElementById('log').textContent = msg }

function showEffect(txt){
  const el = document.getElementById('effect-text')
  el.textContent = txt; el.classList.add('show')
  setTimeout(()=>el.classList.remove('show'),800)
}

function animFighter(id, cls){
  const el = document.getElementById(id)
  el.classList.add(cls)
  setTimeout(()=>el.classList.remove(cls),400)
}

function updateBars(){
  const pp = Math.max(0,state.playerHp/state.playerMaxHp*100)
  const ep = Math.max(0,state.enemyHp/state.enemyMaxHp*100)
  document.getElementById('player-hp-bar').style.width=pp+'%'
  document.getElementById('enemy-hp-bar').style.width=ep+'%'
  document.getElementById('player-hp-val').textContent=`${Math.max(0,state.playerHp)} / ${state.playerMaxHp}`
  document.getElementById('enemy-hp-val').textContent=`${Math.max(0,state.enemyHp)} / ${state.enemyMaxHp}`
  document.getElementById('turn-badge').textContent=state.turn==='player'?'YOUR TURN':'ENEMY TURN'
}

function render(){
  updateBars()
  // player hand
  const handEl = document.getElementById('hand')
  handEl.innerHTML=''
  state.hand.forEach((card,i)=>{
    const d = document.createElement('div')
    d.className = `card ${TYPE_CLASS[card.type]||''} ${state.turn!=='player'||state.busy?'disabled':''}`
    d.innerHTML = `
      <span class="card-icon">${card.icon}</span>
      <span class="card-name">${card.name}</span>
      <span class="card-power">${card.power}</span>
      <span class="card-type">${card.type}</span>
    `
    if(state.turn==='player'&&!state.busy) d.onclick=()=>playCard(i)
    handEl.appendChild(d)
  })
  // enemy preview
  const enemyHand = document.getElementById('enemy-hand')
  enemyHand.innerHTML=''
  state.enemyHand.forEach(()=>{
    const d = document.createElement('div'); d.className='enemy-card'; enemyHand.appendChild(d)
  })
}

function applyPoisons(){
  if(state.playerPoison>0){
    state.playerHp -= state.playerPoison
    setLog(`Poison deals ${state.playerPoison} to you!`)
    state.playerPoison=0
  }
  if(state.enemyPoison>0){
    state.enemyHp -= state.enemyPoison
    state.enemyPoison=0
  }
}

function playCard(idx){
  if(state.busy||state.turn!=='player') return
  state.busy=true
  const card = state.hand[idx]
  state.hand.splice(idx,1)

  let dmg=0, heal=0, shield=0, log=''

  if(card.type==='atk'){
    dmg=card.power; const block=Math.min(state.enemyShield,dmg)
    dmg-=block; state.enemyShield-=block
    state.enemyHp-=dmg
    animFighter('player-fig','attack'); setTimeout(()=>animFighter('enemy-fig','hurt'),200)
    showEffect(dmg>0?`-${dmg}!`:'Blocked!')
    log=`${card.icon} ${card.name} deals ${dmg} damage!`
  } else if(card.type==='def'){
    state.playerShield+=card.power; shield=card.power
    showEffect(`+${card.power} Shield`)
    log=`${card.icon} ${card.name} gives you ${card.power} shield!`
  } else if(card.type==='heal'){
    heal=card.power; state.playerHp=Math.min(state.playerMaxHp,state.playerHp+heal)
    showEffect(`+${heal} HP `)
    log=`${card.icon} ${card.name} restores ${heal} HP!`
  } else if(card.type==='burn'){
    state.enemyPoison=card.power
    showEffect(`Poison! `)
    log=`${card.icon} ${card.name} poisons enemy for ${card.power}!`
  } else if(card.type==='crit'){
    const crit=Math.random()<0.5
    dmg=crit?card.power*2:card.power
    const block=Math.min(state.enemyShield,dmg)
    dmg-=block; state.enemyShield-=block
    state.enemyHp-=dmg
    if(crit){ showEffect('CRITICAL!'); animFighter('player-fig','attack'); setTimeout(()=>animFighter('enemy-fig','hurt'),200) }
    else { animFighter('player-fig','attack'); setTimeout(()=>animFighter('enemy-fig','hurt'),200); showEffect(`-${dmg}!`) }
    log=crit?`CRITICAL HIT! ${card.icon} ${card.name} deals ${dmg}!`:`${card.icon} ${card.name} deals ${dmg}!`
  }

  setLog(log)
  updateBars()

  // draw new card
  state.hand.push(...drawCards(1))

  setTimeout(()=>{
    if(state.enemyHp<=0){ endGame(true); return }
    state.turn='enemy'; state.busy=false
    render()
    setTimeout(enemyTurn,800)
  },700)
}

function enemyTurn(){
  applyPoisons()
  updateBars()
  if(state.playerHp<=0){ endGame(false); return }
  if(state.enemyHp<=0){ endGame(true); return }

  if(state.enemyHand.length===0) state.enemyHand=drawCards(2)
  const card = state.enemyHand.splice(rand(0,state.enemyHand.length-1),1)[0]||CARDS[rand(0,CARDS.length-1)]

  let dmg=0, log=''
  // enemy AI: prefer atk/crit, sometimes def/heal if low
  const useHeal = state.enemyHp < state.enemyMaxHp*0.35 && (card.type==='heal')
  if(card.type==='atk'||card.type==='crit'){
    let pow=card.power
    if(card.type==='crit'&&Math.random()<0.4) pow*=2
    dmg=pow; const block=Math.min(state.playerShield,dmg)
    dmg-=block; state.playerShield-=block
    state.playerHp-=dmg
    animFighter('enemy-fig','attack'); setTimeout(()=>animFighter('player-fig','hurt'),200)
    showEffect(dmg>0?`-${dmg}!`:'Blocked!')
    log=`${state.enemyEmoji} ${state.enemyName} plays ${card.icon} ${card.name} → ${dmg} damage!`
  } else if(useHeal){
    state.enemyHp=Math.min(state.enemyMaxHp,state.enemyHp+card.power)
    log=`${state.enemyEmoji} ${state.enemyName} heals ${card.power} HP!`
  } else if(card.type==='def'){
    state.enemyShield+=card.power
    log=`${state.enemyEmoji} ${state.enemyName} gains ${card.power} shield!`
  } else {
    // fallback atk
    dmg=card.power; const block=Math.min(state.playerShield,dmg)
    dmg-=block; state.playerShield-=block
    state.playerHp-=dmg
    animFighter('enemy-fig','attack'); setTimeout(()=>animFighter('player-fig','hurt'),200)
    log=`${state.enemyEmoji} ${state.enemyName} plays ${card.icon} → ${dmg} damage!`
  }

  setLog(log)
  state.enemyHand.push(...drawCards(1))
  updateBars()

  setTimeout(()=>{
    if(state.playerHp<=0){ endGame(false); return }
    state.turn='player'; state.busy=false
    render()
    setLog('Your turn! Play a card.')
  },700)
}

function endGame(playerWon){
  const overlay = document.getElementById('overlay')
  document.getElementById('result-title').textContent = playerWon ? '🏆 Victory!' : '💀 Defeated'
  document.getElementById('result-sub').textContent = playerWon
    ? `${state.enemyEmoji} ${state.enemyName} has been defeated!`
    : 'You lost the battle. Try again?'
  overlay.classList.add('show')
}

document.getElementById('restart-btn').onclick=initGame
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') initGame()
  const n=parseInt(e.key)
  if(n>=1&&n<=state.hand?.length&&state.turn==='player'&&!state.busy) playCard(n-1)
})

initGame()
</script>
</body>
</html>
