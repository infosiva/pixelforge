<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Math</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a; font-family: system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #fff;
  }
  #app {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; padding: 20px; width: 100%; max-width: 420px; text-align: center;
  }
  #header { display: flex; justify-content: space-between; width: 100%; }
  .badge {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  }
  #timer-bar {
    width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
  }
  #timer-fill {
    height: 100%; border-radius: 4px; background: linear-gradient(90deg, #4ade80, #22c55e);
    transition: width 0.1s linear, background 0.3s;
  }
  #question-area {
    width: 100%; padding: 32px 20px; border-radius: 20px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  }
  #difficulty-label {
    font-size: 11px; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 16px;
    color: #a78bfa;
  }
  #question { font-size: 48px; font-weight: 900; letter-spacing: -0.02em; }
  #options {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
  }
  .opt {
    padding: 16px; border-radius: 14px; font-size: 22px; font-weight: 900;
    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
    color: #fff; cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .opt:hover:not(:disabled) {
    background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.45); transform: translateY(-2px);
  }
  .opt.correct { background: rgba(74,222,128,0.2) !important; border-color: #4ade80 !important; color: #4ade80 !important; }
  .opt.wrong   { background: rgba(248,113,113,0.15) !important; border-color: #f87171 !important; color: #f87171 !important; }
  .opt:disabled { cursor: default; transform: none !important; }
  #streak-row {
    display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700;
  }
  #streak-fire { font-size: 20px; }
  #level-select {
    display: flex; gap: 8px; width: 100%;
  }
  .lvl-btn {
    flex: 1; padding: 8px; border-radius: 10px; font-size: 12px; font-weight: 800;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4); cursor: pointer; font-family: inherit; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .lvl-btn.active {
    background: rgba(124,58,237,0.25); border-color: rgba(167,139,250,0.45); color: #c4b5fd;
  }
  #feedback-msg { font-size: 16px; font-weight: 800; height: 24px; }
  #end-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 20; display: none;
  }
  #end-overlay.show { display: flex; }
  #end-icon { font-size: 60px; }
  #end-title { font-size: 28px; font-weight: 900; }
  #end-stats { font-size: 15px; color: rgba(255,255,255,0.5); }
  #restart-btn {
    padding: 12px 32px; border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    border: none; color: #fff; font-size: 15px; font-weight: 800;
    cursor: pointer; font-family: inherit; margin-top: 8px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="badge" id="score-badge">Score: 0</div>
    <div class="badge" id="q-badge">Q 1/20</div>
    <div class="badge" id="level-badge">EASY</div>
  </div>

  <div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>

  <div id="level-select">
    <button class="lvl-btn active" data-level="easy">EASY</button>
    <button class="lvl-btn" data-level="medium">MEDIUM</button>
    <button class="lvl-btn" data-level="hard">HARD</button>
  </div>

  <div id="question-area">
    <div id="difficulty-label">ARITHMETIC</div>
    <div id="question">?</div>
  </div>

  <div id="options"></div>
  <div id="streak-row">
    <span id="streak-fire">🔥</span>
    <span id="streak-text">Streak: 0</span>
  </div>
  <div id="feedback-msg"></div>
</div>

<div id="end-overlay">
  <div id="end-icon">🧠</div>
  <div id="end-title">Time's Up!</div>
  <div id="end-stats"></div>
  <button id="restart-btn" onclick="startGame()">Play Again</button>
</div>

<script>
const LEVELS = {
  easy:   { ops: ['+', '-'], range: 20,  time: 8000 },
  medium: { ops: ['+', '-', '×'], range: 50, time: 6000 },
  hard:   { ops: ['+', '-', '×', '÷'], range: 100, time: 5000 },
}
const TOTAL_Q = 20

let level = 'easy', score = 0, streak = 0, qNum = 0
let correct, timerInterval, timeLeft, timeTotal, answered

function rand(n) { return Math.floor(Math.random() * n) + 1 }

function makeQuestion() {
  const cfg = LEVELS[level]
  const op = cfg.ops[Math.floor(Math.random() * cfg.ops.length)]
  let a, b, ans

  if (op === '+') { a = rand(cfg.range); b = rand(cfg.range); ans = a + b }
  else if (op === '-') { a = rand(cfg.range); b = rand(a); ans = a - b }
  else if (op === '×') { a = rand(12); b = rand(12); ans = a * b }
  else { // ÷
    b = rand(12); ans = rand(12); a = b * ans
  }
  return { text: `${a} ${op} ${b} = ?`, ans }
}

function makeOptions(ans) {
  const opts = new Set([ans])
  while (opts.size < 4) {
    const delta = Math.floor(Math.random() * 10) - 5
    const v = ans + delta
    if (v !== ans && v >= 0) opts.add(v)
  }
  return [...opts].sort(() => Math.random() - 0.5)
}

function showQ() {
  if (qNum >= TOTAL_Q) { endGame(); return }
  answered = false
  qNum++
  const q = makeQuestion()
  correct = q.ans
  const opts = makeOptions(q.ans)

  document.getElementById('q-badge').textContent = `Q ${qNum}/${TOTAL_Q}`
  document.getElementById('question').textContent = q.text
  document.getElementById('feedback-msg').textContent = ''

  const el = document.getElementById('options')
  el.innerHTML = opts.map(o =>
    `<button class="opt" onclick="pick(${o}, this)">${o}</button>`
  ).join('')

  startTimer()
}

function startTimer() {
  clearInterval(timerInterval)
  timeTotal = LEVELS[level].time
  timeLeft = timeTotal
  const fill = document.getElementById('timer-fill')
  fill.style.background = 'linear-gradient(90deg, #4ade80, #22c55e)'

  timerInterval = setInterval(() => {
    timeLeft -= 100
    const pct = (timeLeft / timeTotal) * 100
    fill.style.width = pct + '%'
    if (pct < 30) fill.style.background = 'linear-gradient(90deg, #f87171, #dc2626)'
    else if (pct < 60) fill.style.background = 'linear-gradient(90deg, #fbbf24, #f59e0b)'
    if (timeLeft <= 0) {
      clearInterval(timerInterval)
      if (!answered) timeoutQ()
    }
  }, 100)
}

function timeoutQ() {
  answered = true
  streak = 0
  updateStreak()
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true
    if (parseInt(b.textContent) === correct) b.classList.add('correct')
  })
  document.getElementById('feedback-msg').textContent = `⏱ Time! Answer: ${correct}`
  document.getElementById('feedback-msg').style.color = '#f87171'
  setTimeout(showQ, 1200)
}

function pick(val, btn) {
  if (answered) return
  answered = true
  clearInterval(timerInterval)
  document.querySelectorAll('.opt').forEach(b => b.disabled = true)

  if (val === correct) {
    streak++
    const bonus = streak >= 5 ? 3 : streak >= 3 ? 2 : 1
    score += 10 * bonus
    btn.classList.add('correct')
    document.getElementById('feedback-msg').textContent = streak > 1 ? `🔥 ×${bonus} Streak bonus! +${10*bonus}` : '✅ Correct!'
    document.getElementById('feedback-msg').style.color = '#4ade80'
  } else {
    streak = 0
    btn.classList.add('wrong')
    document.querySelectorAll('.opt').forEach(b => {
      if (parseInt(b.textContent) === correct) b.classList.add('correct')
    })
    document.getElementById('feedback-msg').textContent = `❌ Correct was: ${correct}`
    document.getElementById('feedback-msg').style.color = '#f87171'
  }

  updateStreak()
  document.getElementById('score-badge').textContent = `Score: ${score}`
  setTimeout(showQ, 900)
}

function updateStreak() {
  document.getElementById('streak-text').textContent = `Streak: ${streak}`
  document.getElementById('streak-fire').textContent = streak >= 5 ? '🔥🔥' : streak >= 3 ? '🔥' : '💤'
}

function endGame() {
  clearInterval(timerInterval)
  const pct = score / (TOTAL_Q * 10)
  const icon = pct >= 0.8 ? '🧠' : pct >= 0.5 ? '⭐' : '📚'
  const title = pct >= 0.8 ? 'Math Genius!' : pct >= 0.5 ? 'Good Work!' : 'Keep Practising!'
  document.getElementById('end-icon').textContent = icon
  document.getElementById('end-title').textContent = title
  document.getElementById('end-stats').textContent = `Score: ${score} / ${TOTAL_Q * 10} points`
  document.getElementById('end-overlay').classList.add('show')
}

function startGame() {
  score = 0; streak = 0; qNum = 0
  document.getElementById('end-overlay').classList.remove('show')
  document.getElementById('score-badge').textContent = 'Score: 0'
  updateStreak()
  showQ()
}

document.querySelectorAll('.lvl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    level = btn.dataset.level
    document.getElementById('level-badge').textContent = level.toUpperCase()
    startGame()
  })
})

startGame()
</script>
</body>
</html>
