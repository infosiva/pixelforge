<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>*{margin:0;padding:0}body{background:#0a0a1a;overflow:hidden}</style></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W=800,H=500;
const config={type:Phaser.AUTO,width:W,height:H,backgroundColor:'#0a0a1a',
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:{preload,create,update}};
const game=new Phaser.Game(config);

let ship,bullets,asteroids,score,lives,wave,sc,lv,wv,alive,cursors,fireKey,thrustVfx;
let lastFire=0;

function preload(){}

function createShipGraphic(scene){
  const g=scene.make.graphics({x:0,y:0,add:false});
  g.fillStyle(0xa78bfa);g.fillTriangle(0,-18,12,12,-12,12);
  g.fillStyle(0x7c3aed);g.fillTriangle(0,-10,6,6,-6,6);
  g.lineStyle(1,0xc4b5fd,0.8);g.strokeTriangle(0,-18,12,12,-12,12);
  g.generateTexture('ship',32,36);g.destroy();
}
function createAsteroidGraphic(scene,size){
  const s=size*16;
  const g=scene.make.graphics({x:0,y:0,add:false});
  const pts=[];const n=8;
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2,r=s/2*(0.7+Math.random()*0.3);pts.push({x:r*Math.cos(a),y:r*Math.sin(a)});}
  g.lineStyle(2,0x64748b,1);g.fillStyle(0x1e293b,1);
  g.beginPath();g.moveTo(pts[0].x+s/2,pts[0].y+s/2);
  pts.forEach(p=>g.lineTo(p.x+s/2,p.y+s/2));g.closePath();g.fillPath();g.strokePath();
  g.generateTexture('ast'+size,s,s);g.destroy();
}

function create(){
  createShipGraphic(this);
  [3,2,1].forEach(s=>createAsteroidGraphic(this,s));
  cursors=this.input.keyboard.createCursorKeys();
  fireKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
  this.input.keyboard.addKey('R').on('down',()=>{if(!alive)this.scene.restart();});
  reset.call(this);
}

function reset(){
  if(ship)ship.destroy();
  if(bullets)bullets.clear(true,true);
  if(asteroids)asteroids.clear(true,true);
  score=0;lives=3;wave=0;alive=true;
  ship=this.physics.add.image(W/2,H/2,'ship').setDepth(5);
  ship.setDrag(0.98);ship.setAngularDrag(0.95);ship.setMaxVelocity(300);
  bullets=this.physics.add.group();
  asteroids=this.physics.add.group();
  // Stars
  if(!this.stars){
    this.stars=this.add.graphics();
    for(let i=0;i<120;i++){const x=Math.random()*W,y=Math.random()*H,r=Math.random()<0.2?1.5:1;this.stars.fillStyle(0xffffff,Math.random()*0.6+0.2);this.stars.fillCircle(x,y,r);}
  }
  if(!sc){
    sc=this.add.text(8,8,'Score: 0',{color:'#a78bfa',fontSize:'15px',fontFamily:'monospace',fontStyle:'bold'}).setDepth(10);
    lv=this.add.text(W-8,8,'♥♥♥',{color:'#ef4444',fontSize:'15px',fontFamily:'monospace'}).setOrigin(1,0).setDepth(10);
    wv=this.add.text(W/2,8,'Wave 1',{color:'#fbbf24',fontSize:'14px',fontFamily:'monospace'}).setOrigin(0.5,0).setDepth(10);
  }
  if(this.ovText){this.ovText.destroy();this.ovText=null;}
  if(this.ovSub){this.ovSub.destroy();this.ovSub=null;}
  spawnWave.call(this);
}

function spawnWave(){
  wave++;wv.setText('Wave '+wave);
  const count=wave+2;
  for(let i=0;i<count;i++){
    const side=Math.floor(Math.random()*4);
    let x,y;
    if(side===0){x=Math.random()*W;y=-50;}
    else if(side===1){x=W+50;y=Math.random()*H;}
    else if(side===2){x=Math.random()*W;y=H+50;}
    else{x=-50;y=Math.random()*H;}
    spawnAsteroid.call(this,x,y,3);
  }
}

function spawnAsteroid(x,y,size){
  const a=this.physics.add.image(x,y,'ast'+size).setDepth(2);
  const speed=60+Math.random()*60+wave*5;
  const angle=Math.random()*Math.PI*2;
  a.setVelocity(Math.cos(angle)*speed,Math.sin(angle)*speed);
  a.setAngularVelocity((Math.random()-0.5)*80);
  a.setData('size',size);
  asteroids.add(a);
}

function update(time){
  if(!alive||!ship)return;
  // Keyboard / gamepad
  const gp=navigator.getGamepads?.()?.[0];
  const left =(cursors.left.isDown) ||(gp&&(gp.axes[0]<-0.5||gp.buttons[14]?.pressed));
  const right=(cursors.right.isDown)||(gp&&(gp.axes[0]>0.5 ||gp.buttons[15]?.pressed));
  const up   =(cursors.up.isDown)   ||(gp&&(gp.axes[1]<-0.5||gp.buttons[12]?.pressed));
  const fire =(Phaser.Input.Keyboard.JustDown(fireKey))||(gp&&gp.buttons[0]?.pressed&&time-lastFire>200);

  if(left) ship.setAngularVelocity(-200);
  else if(right) ship.setAngularVelocity(200);
  else ship.setAngularVelocity(ship.angularVelocity*0.85);

  if(up){
    const rad=Phaser.Math.DegToRad(ship.angle-90);
    this.physics.velocityFromAngle(ship.angle-90,300,ship.body.acceleration);
  } else ship.setAcceleration(0);

  if(fire&&time-lastFire>200){
    lastFire=time;
    const rad=Phaser.Math.DegToRad(ship.angle-90);
    const b=this.physics.add.image(ship.x,ship.y,'ship').setDisplaySize(4,10).setDepth(4).setTint(0xfbbf24);
    this.physics.velocityFromAngle(ship.angle-90,600,b.body.velocity);
    bullets.add(b);
    this.time.delayedCall(1200,()=>{if(b.active)b.destroy();});
  }

  // Wrap
  [ship,...bullets.getChildren(),...asteroids.getChildren()].forEach(o=>{
    if(!o.active)return;
    if(o.x<-60)o.x=W+60; else if(o.x>W+60)o.x=-60;
    if(o.y<-60)o.y=H+60; else if(o.y>H+60)o.y=-60;
  });

  // Bullet-asteroid collision
  this.physics.overlap(bullets,asteroids,(b,a)=>{
    const sz=a.getData('size');
    b.destroy();a.destroy();
    score+=(4-sz)*10;sc.setText('Score: '+score);
    window.parent.postMessage({type:'GAME_SCORE',score},'*');
    if(sz>1){spawnAsteroid.call(this,a.x,a.y,sz-1);spawnAsteroid.call(this,a.x,a.y,sz-1);}
    if(asteroids.countActive()===0)spawnWave.call(this);
  });

  // Ship-asteroid collision
  this.physics.overlap(ship,asteroids,()=>{
    lives--;lv.setText('♥'.repeat(Math.max(0,lives)));
    ship.setPosition(W/2,H/2);ship.setVelocity(0,0);ship.setAngularVelocity(0);
    if(lives<=0){alive=false;ship.destroy();
      this.ovText=this.add.text(W/2,H/2-30,'GAME OVER',{color:'#ef4444',fontSize:'52px',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
      this.ovSub=this.add.text(W/2,H/2+30,'Score: '+score+'   Press R to restart',{color:'rgba(255,255,255,0.5)',fontSize:'18px',fontFamily:'monospace'}).setOrigin(0.5).setDepth(20);
    }
  });
}
</script>
</body></html>
