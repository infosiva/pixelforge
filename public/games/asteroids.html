<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><style>*{margin:0;padding:0}body{background:#0a0a1a;overflow:hidden;user-select:none}canvas{display:block;max-width:100%}</style></head>
<body>
<script src="/phaser.min.js"></script>
<script>
// PostMessage bridge — gamepad keys from parent iframe
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='GAMEPAD_KEY'){
    var ev=new KeyboardEvent(e.data.down?'keydown':'keyup',{key:e.data.key,code:e.data.key,bubbles:true,cancelable:true});
    window.dispatchEvent(ev);document.dispatchEvent(ev);
  }
});

const W=800,H=500;
const config={type:Phaser.CANVAS,width:W,height:H,backgroundColor:'#0a0a1a',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:{preload,create,update}};
const game=new Phaser.Game(config);

let ship,bullets,asteroids,score,lives,wave,sc,lv,wv,alive,cursors,fireKey;
let lastFire=0;

function preload(){}

function createShipGraphic(scene){
  const g=scene.make.graphics({x:0,y:0,add:false});
  g.fillStyle(0xa78bfa);g.fillTriangle(16,0,32,32,0,32);
  g.fillStyle(0x7c3aed);g.fillTriangle(16,8,24,28,8,28);
  g.lineStyle(2,0xc4b5fd,1);g.strokeTriangle(16,0,32,32,0,32);
  g.generateTexture('ship',32,32);g.destroy();
}

function createAstTex(scene,size){
  const s=size*20;const r=s/2;
  const g=scene.make.graphics({x:0,y:0,add:false});
  g.lineStyle(2,0x94a3b8,1);g.fillStyle(0x1e293b,1);
  g.beginPath();
  const pts=8;
  for(let i=0;i<=pts;i++){
    const a=(i/pts)*Math.PI*2;
    const jr=r*(0.7+((i*7+size*3)%5)*0.06);
    i===0?g.moveTo(r+jr*Math.cos(a),r+jr*Math.sin(a)):g.lineTo(r+jr*Math.cos(a),r+jr*Math.sin(a));
  }
  g.closePath();g.fillPath();g.strokePath();
  g.generateTexture('ast'+size,s,s);g.destroy();
}

function create(){
  createShipGraphic(this);
  [3,2,1].forEach(s=>createAstTex(this,s));
  // Stars
  const bg=this.add.graphics();
  for(let i=0;i<100;i++){
    bg.fillStyle(0xffffff,0.1+Math.random()*0.5);
    bg.fillRect(Math.random()*W,Math.random()*H,Math.random()<0.3?2:1,Math.random()<0.3?2:1);
  }
  cursors=this.input.keyboard.createCursorKeys();
  fireKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
  this.input.keyboard.addKey('R').on('down',()=>{if(!alive)this.scene.restart();});
  reset.call(this);
}

function reset(){
  if(ship)ship.destroy();
  bullets?.clear(true,true);
  asteroids?.clear(true,true);
  score=0;lives=3;wave=0;alive=true;
  ship=this.physics.add.image(W/2,H/2,'ship').setDepth(5);
  ship.setDrag(0.98);ship.setAngularDrag(0.95);ship.setMaxVelocity(320);
  bullets=this.physics.add.group();
  asteroids=this.physics.add.group();
  if(!sc){
    sc=this.add.text(8,8,'Score: 0',{color:'#a78bfa',fontSize:'16px',fontFamily:'monospace',fontStyle:'bold'}).setDepth(10);
    lv=this.add.text(W-8,8,'♥♥♥',{color:'#ef4444',fontSize:'16px',fontFamily:'monospace'}).setOrigin(1,0).setDepth(10);
    wv=this.add.text(W/2,8,'Wave 1',{color:'#fbbf24',fontSize:'14px',fontFamily:'monospace'}).setOrigin(0.5,0).setDepth(10);
    this.add.text(W/2,H-16,'Arrow keys: steer  |  Up: thrust  |  Space: fire',{color:'rgba(255,255,255,0.2)',fontSize:'11px',fontFamily:'monospace'}).setOrigin(0.5,1).setDepth(10);
  }
  if(this.ov){this.ov.destroy();this.ov=null;}
  spawnWave.call(this);
}

function spawnWave(){
  wave++;wv.setText('Wave '+wave);
  const count=wave+2;
  for(let i=0;i<count;i++){
    const side=i%4;
    const x=side===0?Math.random()*W:side===1?W+40:Math.random()*W:-40;
    const y=side===0?-40:side===2?H+40:Math.random()*H;
    spawnAst.call(this,x,y,3);
  }
}

function spawnAst(x,y,size){
  const a=this.physics.add.image(x,y,'ast'+size).setDepth(2);
  const spd=50+Math.random()*60+wave*4;
  const ang=Math.random()*Math.PI*2;
  a.setVelocity(Math.cos(ang)*spd,Math.sin(ang)*spd);
  a.setAngularVelocity((Math.random()-0.5)*60);
  a.setData('size',size);
  asteroids.add(a);
}

function update(time){
  if(!alive||!ship)return;
  const gp=navigator.getGamepads?.()?.[0];
  const left=(cursors.left.isDown)||(gp&&(gp.axes[0]<-0.5||gp.buttons[14]?.pressed));
  const right=(cursors.right.isDown)||(gp&&(gp.axes[0]>0.5||gp.buttons[15]?.pressed));
  const up=(cursors.up.isDown)||(gp&&(gp.axes[1]<-0.5||gp.buttons[12]?.pressed));
  const fire=(Phaser.Input.Keyboard.JustDown(fireKey))||(gp&&gp.buttons[0]?.pressed&&time-lastFire>250);

  if(left)ship.setAngularVelocity(-200);
  else if(right)ship.setAngularVelocity(200);
  else ship.setAngularVelocity(ship.angularVelocity*0.85);

  if(up)this.physics.velocityFromAngle(ship.angle-90,280,ship.body.acceleration);
  else ship.setAcceleration(0);

  if(fire&&time-lastFire>250){
    lastFire=time;
    const b=this.physics.add.image(ship.x,ship.y,'ship').setDisplaySize(3,10).setDepth(4).setTint(0xfbbf24);
    this.physics.velocityFromAngle(ship.angle-90,580,b.body.velocity);
    bullets.add(b);
    this.time.delayedCall(1000,()=>{if(b.active)b.destroy();});
  }

  // Screen wrap
  [ship,...bullets.getChildren(),...asteroids.getChildren()].forEach(o=>{
    if(!o.active)return;
    if(o.x<-50)o.x=W+50;else if(o.x>W+50)o.x=-50;
    if(o.y<-50)o.y=H+50;else if(o.y>H+50)o.y=-50;
  });

  this.physics.overlap(bullets,asteroids,(b,a)=>{
    const sz=a.getData('size');
    b.destroy();a.destroy();
    score+=(4-sz)*10;sc.setText('Score: '+score);
    window.parent.postMessage({type:'GAME_SCORE',score},'*');
    if(sz>1){spawnAst.call(this,a.x,a.y,sz-1);spawnAst.call(this,a.x,a.y,sz-1);}
    if(asteroids.countActive()===0)spawnWave.call(this);
  });

  this.physics.overlap(ship,asteroids,()=>{
    lives--;lv.setText('♥'.repeat(Math.max(0,lives)));
    ship.setPosition(W/2,H/2);ship.setVelocity(0);ship.setAngularVelocity(0);
    if(lives<=0){
      alive=false;ship.destroy();
      this.ov=this.add.text(W/2,H/2,'GAME OVER\nScore: '+score+'\nPress R to restart',{color:'#ef4444',fontSize:'36px',fontFamily:'monospace',fontStyle:'bold',align:'center'}).setOrigin(0.5).setDepth(20);
    }
  });
}
</script>
</body></html>
