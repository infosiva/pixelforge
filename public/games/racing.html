<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>*{margin:0;padding:0}body{background:#0a0a1a;overflow:hidden}</style></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// PostMessage bridge — parent can send gamepad/key events into this iframe
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='GAMEPAD_KEY'){
    var ev=new KeyboardEvent(e.data.down?'keydown':'keyup',{key:e.data.key,code:e.data.key,bubbles:true,cancelable:true});
    window.dispatchEvent(ev);document.dispatchEvent(ev);
  }
});

const W=800,H=500;
const config={type:Phaser.CANVAS,width:W,height:H,backgroundColor:'#1a1a0a',
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:{preload,create,update}};
const game=new Phaser.Game(config);

let car,traffic,score,sc,alive,speed,spawnT,lines;
let cursors,keyA,keyD,laneX=[200,320,440,560];

function preload(){}

function makeTex(scene){
  let g=scene.make.graphics({add:false});
  g.fillStyle(0x7c3aed);g.fillRoundedRect(0,0,32,56,6);
  g.fillStyle(0x4c1d95);g.fillRect(4,4,24,20);g.fillRect(4,36,24,14);
  g.fillStyle(0x1e1b4b);g.fillRect(6,6,20,16);
  g.fillStyle(0xfbbf24);g.fillRect(0,4,4,10);g.fillRect(28,4,4,10);
  g.fillRect(0,42,4,10);g.fillRect(28,42,4,10);
  g.generateTexture('car',32,56);g.destroy();
  const trafficColors=[0xef4444,0xf97316,0x22c55e,0x3b82f6,0xec4899];
  trafficColors.forEach((c,i)=>{
    g=scene.make.graphics({add:false});
    g.fillStyle(c);g.fillRoundedRect(0,0,32,52,6);
    g.fillStyle(0,0.4);g.fillRect(4,6,24,16);g.fillRect(4,30,24,14);
    g.fillStyle(0xfbbf24);g.fillRect(0,4,4,8);g.fillRect(28,4,4,8);g.fillRect(0,40,4,8);g.fillRect(28,40,4,8);
    g.generateTexture('traffic'+i,32,52);g.destroy();
  });
}

function create(){
  makeTex(this);
  alive=true;score=0;speed=3;spawnT=0;
  currentLane=1;targetX=laneX[1];

  const road=this.add.graphics();
  road.fillStyle(0x1f2937);road.fillRect(140,0,520,H);
  road.fillStyle(0xef4444);for(let y=0;y<H;y+=40){road.fillRect(140,y,20,20);road.fillRect(640,y,20,20);}
  lines=this.add.graphics();

  car=this.add.image(laneX[1],H-80,'car').setDepth(5);
  traffic=this.add.group();

  sc=this.add.text(8,8,'Score: 0',{color:'#a78bfa',fontSize:'16px',fontFamily:'monospace',fontStyle:'bold'}).setDepth(10);
  this.add.text(W-8,8,'← → / A D to steer',{color:'rgba(255,255,255,0.25)',fontSize:'12px',fontFamily:'monospace'}).setOrigin(1,0).setDepth(10);

  cursors=this.input.keyboard.createCursorKeys();
  keyA=this.input.keyboard.addKey('A');
  keyD=this.input.keyboard.addKey('D');
  this.input.keyboard.addKey('R').on('down',()=>{if(!alive)this.scene.restart();});
  this.input.on('pointerdown',p=>{if(p.x<W/2)tryMoveLeft();else tryMoveRight();});
}

let currentLane=1,targetX,roadOffset=0;
let lastGpL=false,lastGpR=false;
let leftWas=false,rightWas=false;

function tryMoveLeft(){if(currentLane>0){currentLane--;targetX=laneX[currentLane];}}
function tryMoveRight(){if(currentLane<3){currentLane++;targetX=laneX[currentLane];}}

function update(t,dt){
  if(!alive)return;
  const gp=navigator.getGamepads?.()?.[0];

  const leftNow=(cursors.left.isDown||keyA.isDown)||(gp&&(gp.axes[0]<-0.5||gp.buttons[14]?.pressed));
  const rightNow=(cursors.right.isDown||keyD.isDown)||(gp&&(gp.axes[0]>0.5||gp.buttons[15]?.pressed));

  if(leftNow&&!leftWas)tryMoveLeft();
  if(rightNow&&!rightWas)tryMoveRight();
  leftWas=leftNow;rightWas=rightNow;

  // Smooth movement — no lock, always lerp toward targetX
  car.x=Phaser.Math.Linear(car.x,targetX,0.22);
  car.angle=(targetX>car.x+2)?6:(targetX<car.x-2)?-6:car.angle*0.75;

  roadOffset=(roadOffset+speed)%(60);
  lines.clear();
  lines.fillStyle(0xffffff,0.2);
  for(let lane=1;lane<4;lane++){
    const lx=140+lane*(520/4);
    for(let y=-60+roadOffset;y<H+60;y+=60)lines.fillRect(lx-2,y,4,36);
  }

  spawnT+=dt;
  if(spawnT>Math.max(400,1200-score*0.5)){
    spawnT=0;
    const lane=Phaser.Math.Between(0,3);
    const texIdx=Phaser.Math.Between(0,4);
    const t=this.add.image(laneX[lane],-60,'traffic'+texIdx).setDepth(4);
    traffic.add(t);
  }

  traffic.getChildren().forEach(t=>{
    t.y+=speed+1;
    if(t.y>H+80){t.destroy();score+=5;sc.setText('Score: '+score);window.parent.postMessage({type:'GAME_SCORE',score},'*');}
    if(Math.abs(t.x-car.x)<26&&Math.abs(t.y-car.y)<40){crash.call(this);}
  });

  speed=Math.min(10,3+score*0.003);
}

function crash(){
  alive=false;
  this.cameras.main.shake(400,0.015);
  this.add.text(W/2,H/2-30,'CRASH!',{color:'#ef4444',fontSize:'64px',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
  this.add.text(W/2,H/2+40,'Score: '+score+'   Press R to restart',{color:'rgba(255,255,255,0.5)',fontSize:'18px',fontFamily:'monospace'}).setOrigin(0.5).setDepth(20);
}
</script>
</body></html>
