<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block;max-width:100%}</style></head>
<body>
<script src="/phaser.min.js"></script>
<script>
window.addEventListener("message",function(e){if(e.data&&e.data.type==="GAMEPAD_KEY"){var ev=new KeyboardEvent(e.data.down?"keydown":"keyup",{key:e.data.key,code:e.data.key,bubbles:true});window.dispatchEvent(ev);}});

const W=800,H=500,PAD_W=14,PAD_H=90,BALL_R=10,SPEED=420,PAD_SPEED=480;
let ball,lPad,rPad,lScore,rScore,lTxt,rTxt,cursors,wasd,started;

const cfg={type:Phaser.CANVAS,width:W,height:H,backgroundColor:'#000000',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:{preload,create,update}};
new Phaser.Game(cfg);

function preload(){}
function create(){
  lScore=0;rScore=0;started=false;
  const g=this.add.graphics();
  g.fillStyle(0xffffff,0.12);g.fillRect(W/2-1,0,2,H);
  for(let y=10;y<H;y+=30){g.fillStyle(0xffffff,0.3);g.fillRect(W/2-2,y,4,16);}

  // pads
  const pt=this.add.graphics();pt.fillStyle(0xffffff);pt.fillRoundedRect(0,0,PAD_W,PAD_H,4);pt.generateTexture('pad',PAD_W,PAD_H);pt.destroy();
  lPad=this.physics.add.image(24,H/2,'pad');lPad.setCollideWorldBounds(true);lPad.body.allowGravity=false;lPad.setImmovable(true);
  rPad=this.physics.add.image(W-24,H/2,'pad');rPad.setCollideWorldBounds(true);rPad.body.allowGravity=false;rPad.setImmovable(true);

  // ball
  const bt=this.add.graphics();bt.fillStyle(0xffffff);bt.fillCircle(BALL_R,BALL_R,BALL_R);bt.generateTexture('ball',BALL_R*2,BALL_R*2);bt.destroy();
  ball=this.physics.add.image(W/2,H/2,'ball');ball.setBounce(1,1);ball.setCollideWorldBounds(true);ball.body.allowGravity=false;

  lTxt=this.add.text(W/4,30,'0',{fontSize:'64px',color:'#fff',alpha:0.6,fontStyle:'bold'}).setOrigin(0.5);
  rTxt=this.add.text(3*W/4,30,'0',{fontSize:'64px',color:'#fff',alpha:0.6,fontStyle:'bold'}).setOrigin(0.5);
  this.add.text(W/2,H/2,'Press SPACE / Tap to start',{fontSize:'22px',color:'#aaa'}).setOrigin(0.5).setName('hint');

  cursors=this.input.keyboard.createCursorKeys();
  wasd=this.input.keyboard.addKeys('W,S,A,D');

  const go=()=>{if(started)return;started=true;this.children.getByName('hint').destroy();launch();};
  this.input.keyboard.on('keydown-SPACE',go);this.input.on('pointerdown',go);

  this.physics.add.collider(ball,lPad,hitPad);
  this.physics.add.collider(ball,rPad,hitPad);

  // track mouse/touch for right pad
  this.input.on('pointermove',p=>{rPad.y=Phaser.Math.Clamp(p.y,PAD_H/2,H-PAD_H/2);});
}

function launch(){
  const angle=Phaser.Math.Between(-40,40)*(Math.random()<0.5?1:-1);
  const speed=SPEED;
  ball.setVelocity(Math.cos(Phaser.Math.DegToRad(angle))*speed*(Math.random()<0.5?1:-1),Math.sin(Phaser.Math.DegToRad(angle))*speed);
}

function hitPad(b,pad){
  const diff=(b.y-pad.y)/PAD_H;
  b.setVelocityY(diff*600);
  const spd=Math.min(Math.abs(b.body.velocity.x)*1.04,800);
  b.setVelocityX(pad===lPad?spd:-spd);
}

function update(){
  if(!started)return;
  // AI for left pad (opponent)
  const diff=ball.y-lPad.y;
  lPad.setVelocityY(Phaser.Math.Clamp(diff*4,-PAD_SPEED*0.8,PAD_SPEED*0.8));
  // Player keyboard right pad
  if(cursors.up.isDown||wasd.W.isDown)rPad.setVelocityY(-PAD_SPEED);
  else if(cursors.down.isDown||wasd.S.isDown)rPad.setVelocityY(PAD_SPEED);
  else if(!this.input.activePointer.isDown)rPad.setVelocityY(0);
  // Score
  if(ball.x<0){rScore++;rTxt.setText(rScore);ball.setPosition(W/2,H/2);ball.setVelocity(0,0);this.time.delayedCall(800,launch);}
  if(ball.x>W){lScore++;lTxt.setText(lScore);ball.setPosition(W/2,H/2);ball.setVelocity(0,0);this.time.delayedCall(800,launch);}
}
</script>
</body>
</html>
