<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><style>*{margin:0;padding:0}body{background:#050510;overflow:hidden}</style></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
window.addEventListener("message",function(e){
  if(e.data&&e.data.type==="GAMEPAD_KEY"){
    var ev=new KeyboardEvent(e.data.down?"keydown":"keyup",{key:e.data.key,code:e.data.key,bubbles:true,cancelable:true});
    window.dispatchEvent(ev);document.dispatchEvent(ev);
  }
});

const W=800,H=600;

// Adaptive difficulty state
let score,lives,level,streak,gameOver,gameStarted;
let answerData,selected,timer,timerVal,currentTime;
let recentTimes=[]; // last 5 answer times in seconds
let adaptiveTime=7;  // starts at 7s (medium), adjusts per performance
const MIN_TIME=2.5, MAX_TIME=10, TARGET_TIME=4; // target: ~4s avg answers

let scoreTxt,livesTxt,levelTxt,streakTxt,questionTxt,timerBar,timerBg;
let answerBtns,feedbackTxt,startScreen,gameOverScreen,adaptTxt;
let questionStartTime;

// Question generation — 3 tiers: medium / hard / brutal
function makeQuestion(lvl){
  const tier=lvl<=3?'medium':lvl<=6?'hard':'brutal';

  let a,b,c,answer,label,wrongs;

  if(tier==='medium'){
    // Two-step or larger numbers
    const ops=['+','-','×','÷','mixed'];
    const op=ops[Math.floor(Math.random()*4)]; // no mixed yet at medium
    if(op==='+'){
      a=Math.floor(Math.random()*50)+10;
      b=Math.floor(Math.random()*50)+10;
      answer=a+b; label=`${a} + ${b}`;
    } else if(op==='-'){
      a=Math.floor(Math.random()*80)+20;
      b=Math.floor(Math.random()*a*0.7)+5;
      answer=a-b; label=`${a} − ${b}`;
    } else if(op==='×'){
      a=Math.floor(Math.random()*9)+3;
      b=Math.floor(Math.random()*9)+3;
      answer=a*b; label=`${a} × ${b}`;
    } else {
      b=Math.floor(Math.random()*9)+2;
      answer=Math.floor(Math.random()*12)+2;
      a=answer*b; label=`${a} ÷ ${b}`;
    }
  } else if(tier==='hard'){
    // Two-operand with larger range, or two-step
    const r=Math.random();
    if(r<0.3){
      // two-step: (a+b)×c
      a=Math.floor(Math.random()*12)+2;
      b=Math.floor(Math.random()*12)+2;
      c=Math.floor(Math.random()*6)+2;
      answer=(a+b)*c; label=`(${a}+${b})×${c}`;
    } else if(r<0.6){
      a=Math.floor(Math.random()*12)+4;
      b=Math.floor(Math.random()*12)+4;
      answer=a*b; label=`${a} × ${b}`;
    } else if(r<0.8){
      // percentage: x% of n
      const pcts=[10,20,25,50,75];
      const pct=pcts[Math.floor(Math.random()*pcts.length)];
      const n=Math.floor(Math.random()*16+2)*10; // multiple of 10
      answer=Math.round(n*pct/100); label=`${pct}% of ${n}`;
    } else {
      // square
      a=Math.floor(Math.random()*10)+4;
      answer=a*a; label=`${a}²`;
    }
  } else {
    // brutal: three-step or complex
    const r=Math.random();
    if(r<0.25){
      a=Math.floor(Math.random()*15)+5;
      b=Math.floor(Math.random()*10)+2;
      c=Math.floor(Math.random()*8)+2;
      answer=a*b-c; label=`${a}×${b}−${c}`;
    } else if(r<0.5){
      a=Math.floor(Math.random()*20)+10;
      b=Math.floor(Math.random()*20)+10;
      c=Math.floor(Math.random()*5)+2;
      answer=a+b*c; label=`${a}+${b}×${c}`;
    } else if(r<0.75){
      // square root (perfect squares)
      const roots=[4,9,16,25,36,49,64,81,100,121,144,169,196,225];
      const sq=roots[Math.floor(Math.random()*roots.length)];
      answer=Math.sqrt(sq); label=`√${sq}`;
    } else {
      a=Math.floor(Math.random()*15)+5;
      b=Math.floor(Math.random()*8)+2;
      c=Math.floor(Math.random()*10)+2;
      answer=(a+b)*c; label=`(${a}+${b})×${c}`;
    }
  }

  // Smart wrong answers — same magnitude, plausible mistakes
  wrongs=new Set();
  const variants=[
    answer+1,answer-1,answer+2,answer-2,
    Math.round(answer*1.1),Math.round(answer*0.9),
    answer+10,answer-10,answer+5,answer-5,
  ].filter(w=>w!==answer&&w>0&&Number.isInteger(w));

  // shuffle variants and pick 3
  for(let i=variants.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[variants[i],variants[j]]=[variants[j],variants[i]];}
  let vi=0;
  while(wrongs.size<3&&vi<variants.length)wrongs.add(variants[vi++]);
  // fallback if not enough variants
  while(wrongs.size<3){const w=answer+Math.floor(Math.random()*20)-10;if(w!==answer&&w>0&&!wrongs.has(w))wrongs.add(w);}

  const opts=[answer,...wrongs].sort(()=>Math.random()-0.5);
  return{label,answer,opts,tier};
}

// Adaptive timer: use recent answer times to adjust pressure
function calcAdaptiveTime(){
  if(recentTimes.length<2)return adaptiveTime;
  const avg=recentTimes.reduce((s,t)=>s+t,0)/recentTimes.length;
  // If player is fast (avg < target-1), tighten by 0.5s; if slow, ease by 0.5s
  if(avg<TARGET_TIME-1)adaptiveTime=Math.max(MIN_TIME,adaptiveTime-0.5);
  else if(avg>TARGET_TIME+1)adaptiveTime=Math.min(MAX_TIME,adaptiveTime+0.4);
  return Math.round(adaptiveTime*10)/10;
}

const config={type:Phaser.CANVAS,width:W,height:H,backgroundColor:'#050510',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  scene:{preload,create,update}};
const game=new Phaser.Game(config);
function preload(){}

function create(){
  score=0;lives=3;level=1;streak=0;gameOver=false;gameStarted=false;
  recentTimes=[];adaptiveTime=7;

  // Background
  const g=this.add.graphics();
  g.lineStyle(1,0x1a1a4a,0.3);
  for(let x=0;x<W;x+=40)g.lineBetween(x,0,x,H);
  for(let y=0;y<H;y+=40)g.lineBetween(0,y,W,y);
  const b1=this.add.circle(200,150,200,0x3b0066,0.15);
  const b2=this.add.circle(600,400,180,0x006633,0.12);
  this.tweens.add({targets:b1,x:250,y:120,duration:4000,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
  this.tweens.add({targets:b2,x:580,y:430,duration:5000,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});

  // HUD
  scoreTxt=this.add.text(20,16,'Score: 0',{fontSize:'20px',fontFamily:'monospace',color:'#ffffff',fontStyle:'bold'});
  livesTxt=this.add.text(W/2,16,'❤️❤️❤️',{fontSize:'20px',fontFamily:'monospace'}).setOrigin(0.5,0);
  levelTxt=this.add.text(W-20,16,'Level 1',{fontSize:'18px',fontFamily:'monospace',color:'#a78bfa'}).setOrigin(1,0);
  streakTxt=this.add.text(W/2,44,'',{fontSize:'14px',fontFamily:'monospace',color:'#fbbf24'}).setOrigin(0.5,0);
  // Adaptive speed indicator (small, bottom right)
  adaptTxt=this.add.text(W-16,H-14,'',{fontSize:'11px',fontFamily:'monospace',color:'rgba(255,255,255,0.25)'}).setOrigin(1,1);

  // Timer bar
  timerBg=this.add.rectangle(W/2,86,W-40,10,0x1a1a3a).setOrigin(0.5,0);
  timerBar=this.add.rectangle(20,86,W-40,10,0x4ade80).setOrigin(0,0);

  // Question
  questionTxt=this.add.text(W/2,165,'',{fontSize:'52px',fontFamily:'monospace',color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5,0.5);

  // Answer buttons — 2×2 grid
  answerBtns=[];
  const positions=[[W/2-155,345],[W/2+155,345],[W/2-155,435],[W/2+155,435]];
  for(let i=0;i<4;i++){
    const[bx,by]=positions[i];
    const bg=this.add.rectangle(bx,by,280,70,0x1a1040,1).setInteractive({cursor:'pointer'});
    bg.setStrokeStyle(2,0x7c3aed);
    const txt=this.add.text(bx,by,'',{fontSize:'28px',fontFamily:'monospace',color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5,0.5);
    bg.on('pointerover',()=>{if(!selected)bg.setFillStyle(0x2d1b69);});
    bg.on('pointerout',()=>{if(!selected)bg.setFillStyle(0x1a1040);});
    bg.on('pointerdown',()=>checkAnswer.call(this,i));
    answerBtns.push({bg,txt});
  }

  feedbackTxt=this.add.text(W/2,285,'',{fontSize:'22px',fontFamily:'monospace',color:'#4ade80',fontStyle:'bold'}).setOrigin(0.5,0.5).setAlpha(0);

  // Tier badge (medium/hard/brutal label)
  this.tierBadge=this.add.text(W/2,115,'',{fontSize:'12px',fontFamily:'monospace',color:'rgba(255,255,255,0.3)',fontStyle:'bold',letterSpacing:2}).setOrigin(0.5,0.5);

  this.input.keyboard.on('keydown',({key})=>{
    if(!gameStarted||gameOver)return;
    if(key==='1')checkAnswer.call(this,0);
    if(key==='2')checkAnswer.call(this,1);
    if(key==='3')checkAnswer.call(this,2);
    if(key==='4')checkAnswer.call(this,3);
    if(key==='r'||key==='R')restart.call(this);
  });

  showStartScreen.call(this);
}

function showStartScreen(){
  startScreen=this.add.container(W/2,H/2,[
    this.add.rectangle(0,0,520,360,0x0d0d2e,0.97).setStrokeStyle(2,0x7c3aed),
    this.add.text(0,-130,'🧮 Math Rush',{fontSize:'36px',fontFamily:'monospace',color:'#fff',fontStyle:'bold'}).setOrigin(0.5),
    this.add.text(0,-82,'Adaptive difficulty — gets harder as you get faster!',{fontSize:'13px',fontFamily:'monospace',color:'rgba(255,255,255,0.45)'}).setOrigin(0.5),
    this.add.rectangle(-100,-35,8,8,0xa78bfa).setOrigin(0.5),
    this.add.text(-88,-35,'Medium: 2-digit arithmetic',{fontSize:'12px',fontFamily:'monospace',color:'#a78bfa'}).setOrigin(0,0.5),
    this.add.rectangle(-100,-5,8,8,0xfbbf24).setOrigin(0.5),
    this.add.text(-88,-5,'Hard: two-step, squares, %',{fontSize:'12px',fontFamily:'monospace',color:'#fbbf24'}).setOrigin(0,0.5),
    this.add.rectangle(-100,25,8,8,0xef4444).setOrigin(0.5),
    this.add.text(-88,25,'Brutal: three-step, roots',{fontSize:'12px',fontFamily:'monospace',color:'#ef4444'}).setOrigin(0,0.5),
    this.add.text(0,90,'Press 1–4 to answer · Tap on mobile',{fontSize:'13px',fontFamily:'monospace',color:'rgba(255,255,255,0.4)'}).setOrigin(0.5),
    this.add.text(0,130,'Tap / Space to Start',{fontSize:'18px',fontFamily:'monospace',color:'#4ade80',fontStyle:'bold'}).setOrigin(0.5),
  ]);
  this.input.once('pointerdown',()=>startGame.call(this));
  this.input.keyboard.once('keydown-SPACE',()=>startGame.call(this));
}

function startGame(){
  if(startScreen)startScreen.destroy();
  gameStarted=true;
  nextQuestion.call(this);
}

function nextQuestion(){
  selected=false;
  questionStartTime=Date.now();
  const t=calcAdaptiveTime();
  const q=makeQuestion(level);
  answerData=q;
  questionTxt.setText(q.label+' = ?');

  // Tier badge
  const tierCols={medium:'#a78bfa',hard:'#fbbf24',brutal:'#ef4444'};
  this.tierBadge.setText(q.tier.toUpperCase()).setStyle({color:tierCols[q.tier]||'#fff'});

  for(let i=0;i<4;i++){
    answerBtns[i].txt.setText(String(q.opts[i]));
    answerBtns[i].bg.setFillStyle(0x1a1040);
    answerBtns[i].bg.setStrokeStyle(2,0x7c3aed);
    answerBtns[i].bg.setInteractive();
  }
  feedbackTxt.setAlpha(0);

  timerVal=t;
  if(timer)timer.remove();
  timerBar.width=W-40;
  timerBar.setFillStyle(0x4ade80);
  const ticks=Math.round(t*10);
  timer=this.time.addEvent({delay:100,repeat:ticks-1,callback:()=>tickTimer.call(this,t)});
  adaptTxt.setText(`⏱ ${t}s`);
}

function tickTimer(maxTime){
  timerVal-=0.1;
  const pct=Math.max(0,timerVal/maxTime);
  timerBar.width=(W-40)*pct;
  const col=pct>0.5?0x4ade80:pct>0.25?0xfbbf24:0xef4444;
  timerBar.setFillStyle(col);
  if(timerVal<=0.05)timeUp.call(this);
}

function timeUp(){
  if(selected)return;
  selected=true;
  if(timer)timer.remove();
  // record as max time (player was slow)
  const elapsed=adaptiveTime;
  recentTimes.push(elapsed);
  if(recentTimes.length>5)recentTimes.shift();
  lives--;streak=0;
  updateHUD.call(this);
  const ci=answerData.opts.indexOf(answerData.answer);
  answerBtns[ci].bg.setFillStyle(0x166534);
  answerBtns[ci].bg.setStrokeStyle(2,0x4ade80);
  feedbackTxt.setText('⏰ Too slow! −1 life').setStyle({color:'#ef4444'}).setAlpha(1);
  if(lives<=0){this.time.delayedCall(1000,()=>endGame.call(this));return;}
  this.time.delayedCall(1300,()=>nextQuestion.call(this));
}

function checkAnswer(idx){
  if(!gameStarted||gameOver||selected)return;
  selected=true;
  if(timer)timer.remove();
  const elapsed=(Date.now()-questionStartTime)/1000;
  recentTimes.push(elapsed);
  if(recentTimes.length>5)recentTimes.shift();

  const chosen=answerData.opts[idx];
  const correct=chosen===answerData.answer;
  if(correct){
    streak++;
    // Bonus pts: base 10 + streak bonus + speed bonus
    const streakBonus=Math.min(streak,6)*5;
    const speedBonus=elapsed<2?20:elapsed<3?10:elapsed<4?5:0;
    const pts=10+streakBonus+speedBonus;
    score+=pts;
    // Level up threshold scales
    if(score>=(level*100+level*(level-1)*20))level=Math.min(level+1,10);
    answerBtns[idx].bg.setFillStyle(0x166534);
    answerBtns[idx].bg.setStrokeStyle(2,0x4ade80);
    const parts=[];
    if(streak>1)parts.push(`🔥×${streak}`);
    if(speedBonus>0)parts.push(`⚡+${speedBonus}`);
    feedbackTxt.setText(`✓ +${pts}${parts.length?' '+parts.join(' '):''}`).setStyle({color:'#4ade80'}).setAlpha(1);
    spawnParticles.call(this,answerBtns[idx].bg.x,answerBtns[idx].bg.y,0x4ade80);
    this.cameras.main.shake(80,0.003);
  }else{
    streak=0;lives--;
    answerBtns[idx].bg.setFillStyle(0x7f1d1d);
    answerBtns[idx].bg.setStrokeStyle(2,0xef4444);
    const ci=answerData.opts.indexOf(answerData.answer);
    answerBtns[ci].bg.setFillStyle(0x166534);
    answerBtns[ci].bg.setStrokeStyle(2,0x4ade80);
    feedbackTxt.setText(`✗ ${answerData.answer}`).setStyle({color:'#ef4444'}).setAlpha(1);
    this.cameras.main.shake(200,0.008);
  }
  updateHUD.call(this);
  if(!correct&&lives<=0){this.time.delayedCall(1000,()=>endGame.call(this));return;}
  this.time.delayedCall(correct?800:1200,()=>nextQuestion.call(this));
}

function spawnParticles(x,y,color){
  for(let i=0;i<14;i++){
    const p=this.add.circle(x,y,4,color);
    const angle=Math.random()*Math.PI*2;
    const sp=70+Math.random()*90;
    this.tweens.add({targets:p,x:x+Math.cos(angle)*sp,y:y+Math.sin(angle)*sp,alpha:0,scaleX:0.2,scaleY:0.2,duration:650,ease:'Power2',onComplete:()=>p.destroy()});
  }
}

function updateHUD(){
  scoreTxt.setText(`Score: ${score}`);
  livesTxt.setText('❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives)));
  levelTxt.setText(`Lv ${level}`);
  streakTxt.setText(streak>1?`🔥 ×${streak}`:'');
}

function endGame(){
  gameOver=true;
  if(timer)timer.remove();
  for(const b of answerBtns)b.bg.disableInteractive();
  const avgT=recentTimes.length?Math.round(recentTimes.reduce((s,t)=>s+t,0)/recentTimes.length*10)/10:'-';
  gameOverScreen=this.add.container(W/2,H/2,[
    this.add.rectangle(0,0,440,340,0x0d0d2e,0.97).setStrokeStyle(2,0xef4444),
    this.add.text(0,-130,'Game Over',{fontSize:'36px',fontFamily:'monospace',color:'#ef4444',fontStyle:'bold'}).setOrigin(0.5),
    this.add.text(0,-80,`Score: ${score}`,{fontSize:'28px',fontFamily:'monospace',color:'#fff',fontStyle:'bold'}).setOrigin(0.5),
    this.add.text(0,-38,`Level ${level} reached`,{fontSize:'16px',fontFamily:'monospace',color:'#a78bfa'}).setOrigin(0.5),
    this.add.text(0,-6,`Best Streak: ${streak}`,{fontSize:'15px',fontFamily:'monospace',color:'#fbbf24'}).setOrigin(0.5),
    this.add.text(0,26,`Avg answer: ${avgT}s`,{fontSize:'14px',fontFamily:'monospace',color:'rgba(255,255,255,0.4)'}).setOrigin(0.5),
    this.add.text(0,80,'Tap / R to Restart',{fontSize:'18px',fontFamily:'monospace',color:'#4ade80',fontStyle:'bold'}).setOrigin(0.5),
  ]);
  this.input.once('pointerdown',()=>restart.call(this));
  this.input.keyboard.once('keydown-R',()=>restart.call(this));
}

function restart(){
  score=0;lives=3;level=1;streak=0;gameOver=false;gameStarted=true;
  recentTimes=[];adaptiveTime=7;
  if(gameOverScreen)gameOverScreen.destroy();
  updateHUD.call(this);
  nextQuestion.call(this);
}

function update(){}
</script>
</body>
</html>
