<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
window.addEventListener('message', e => {
  if (e.data?.type === 'GAMEPAD_KEY') {
    const ev = new KeyboardEvent(e.data.down ? 'keydown' : 'keyup', { key: e.data.key, code: e.data.key, bubbles: true });
    window.dispatchEvent(ev);
  }
});

const W = 480, H = 720;
let score = 0, lives = 3, level = 1, combo = 0, shield = 0;
let ship, bullets, enemies, enemyBullets, particles, powerups;
let cursors, fireKey, restartKey;
let scoreText, livesText, levelText, comboText, shieldBar;
let gameOver = false, gameStarted = false;
let waveTimer = 0, spawnRate = 120, bossActive = false;
let touchLeft = false, touchRight = false, touchFire = false;

const config = {
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#000005',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    parent: document.body,
  },
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: { preload, create, update }
};

const game = new Phaser.Game(config);

function preload() {}

function drawTextures(scene) {
  // Ship
  let g = scene.make.graphics({ add: false });
  g.fillStyle(0x00ccff); g.fillTriangle(24, 0, 0, 56, 48, 56);
  g.fillStyle(0x0066aa); g.fillRect(16, 32, 16, 24);
  g.fillStyle(0x00ffff); g.fillRect(20, 12, 8, 20);
  g.fillStyle(0xff6600); g.fillRect(10, 52, 12, 8); g.fillRect(26, 52, 12, 8);
  g.generateTexture('ship', 48, 64); g.destroy();

  // Enemy types
  [[0xee1111, 0xff4444, 'enemy1'], [0xaa00ff, 0xcc44ff, 'enemy2'], [0xff8800, 0xffaa44, 'enemy3']].forEach(([c1, c2, name]) => {
    g = scene.make.graphics({ add: false });
    g.fillStyle(c1); g.fillRect(4, 8, 40, 28);
    g.fillStyle(c2); g.fillRect(0, 12, 8, 16); g.fillRect(40, 12, 8, 16);
    g.fillRect(14, 0, 20, 12);
    g.fillStyle(0xffffff); g.fillRect(12, 12, 8, 8); g.fillRect(28, 12, 8, 8);
    g.generateTexture(name, 48, 36); g.destroy();
  });

  // Boss
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x880000); g.fillRect(0, 20, 96, 60);
  g.fillStyle(0xcc0000); g.fillRect(10, 0, 76, 30); g.fillRect(0, 60, 96, 20);
  g.fillStyle(0xff2200); g.fillRect(20, 40, 16, 16); g.fillRect(60, 40, 16, 16);
  g.fillStyle(0xffffff); g.fillRect(24, 44, 8, 8); g.fillRect(64, 44, 8, 8);
  g.fillStyle(0xff6600); g.fillRect(35, 50, 26, 10);
  g.generateTexture('boss', 96, 80); g.destroy();

  // Bullet
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x00ffcc); g.fillRect(2, 0, 4, 16);
  g.fillStyle(0x00ffff); g.fillRect(3, 0, 2, 8);
  g.generateTexture('bullet', 8, 16); g.destroy();

  // Enemy bullet
  g = scene.make.graphics({ add: false });
  g.fillStyle(0xff3300); g.fillRect(2, 0, 4, 14);
  g.generateTexture('ebullet', 8, 14); g.destroy();

  // Power-ups
  const puColors = { shield: 0x00aaff, rapid: 0xffaa00, triple: 0xff00aa, bomb: 0xff5500 };
  Object.entries(puColors).forEach(([name, color]) => {
    g = scene.make.graphics({ add: false });
    g.fillStyle(color, 0.8); g.fillCircle(14, 14, 12);
    g.lineStyle(2, 0xffffff, 0.9); g.strokeCircle(14, 14, 12);
    g.generateTexture('pu_' + name, 28, 28); g.destroy();
  });

  // Star particles
  g = scene.make.graphics({ add: false });
  g.fillStyle(0xffffff); g.fillRect(0, 0, 2, 2);
  g.generateTexture('star', 2, 2); g.destroy();
}

function makeStarfield(scene) {
  const gfx = scene.add.graphics();
  for (let i = 0; i < 200; i++) {
    const x = Phaser.Math.Between(0, W);
    const y = Phaser.Math.Between(0, H);
    const a = Math.random() * 0.8 + 0.2;
    const s = Math.random() < 0.1 ? 2 : 1;
    gfx.fillStyle(0xffffff, a);
    gfx.fillRect(x, y, s, s);
  }
  return gfx;
}

function create() {
  makeStarfield(this);
  drawTextures(this);

  // Groups
  bullets = this.physics.add.group();
  enemies = this.physics.add.group();
  enemyBullets = this.physics.add.group();
  powerups = this.physics.add.group();
  particles = this.add.particles(0, 0, 'star', { speed: { min: 60, max: 200 }, scale: { start: 1.5, end: 0 }, lifespan: 600, blendMode: 'ADD', emitting: false });

  // Ship
  ship = this.physics.add.image(W / 2, H - 80, 'ship');
  ship.setCollideWorldBounds(true);

  // Input
  cursors = this.input.keyboard.createCursorKeys();
  fireKey = this.input.keyboard.addKey('Z');
  this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE).on('down', () => { if (gameStarted && !gameOver) fire(this); });
  restartKey = this.input.keyboard.addKey('R');

  // WASD
  this.input.keyboard.addKey('A').on('down', () => { if (ship) ship.body.velocity.x = -320; });
  this.input.keyboard.addKey('D').on('down', () => { if (ship) ship.body.velocity.x = 320; });

  // Touch controls
  setupTouch(this);

  // HUD
  scoreText  = this.add.text(10, 10,  'SCORE 0',   { fontSize: '18px', fill: '#00ffcc', fontFamily: 'monospace', fontStyle: 'bold' }).setDepth(20);
  livesText  = this.add.text(10, 34,  '♥ ♥ ♥',     { fontSize: '16px', fill: '#ff4466', fontFamily: 'monospace' }).setDepth(20);
  levelText  = this.add.text(W-10, 10,'LVL 1',     { fontSize: '18px', fill: '#aaffcc', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(1, 0).setDepth(20);
  comboText  = this.add.text(W/2, 60, '',           { fontSize: '22px', fill: '#ffdd00', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5).setDepth(20).setAlpha(0);
  shieldBar  = this.add.graphics().setDepth(20);

  // Auto-fire
  this.time.addEvent({ delay: 200, callback: () => { if (gameStarted && !gameOver) fire(this); }, loop: true });

  showStart(this);
}

function setupTouch(scene) {
  scene.input.on('pointerdown', p => {
    if (!gameStarted || gameOver) { gameStarted = true; startWave(scene); return; }
    if (p.x < W * 0.35) touchLeft = true;
    else if (p.x > W * 0.65) touchRight = true;
    else touchFire = true;
  });
  scene.input.on('pointerup', p => { touchLeft = false; touchRight = false; touchFire = false; });

  // Mobile tap buttons
  const btnY = H - 30;
  [['◄', 60, W * 0.15], ['FIRE', 60, W * 0.5], ['►', 60, W * 0.85]].forEach(([label, r, x]) => {
    const btn = scene.add.circle(x, btnY, 32, 0xffffff, 0.1).setDepth(30).setInteractive();
    scene.add.text(x, btnY, label, { fontSize: '20px', fill: '#ffffff88', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(31);
    btn.on('pointerdown', () => { if (label === '◄') touchLeft = true; else if (label === '►') touchRight = true; else touchFire = true; });
    btn.on('pointerup', () => { touchLeft = false; touchRight = false; touchFire = false; });
  });
}

function showStart(scene) {
  gameStarted = false;
  const overlay = scene.add.rectangle(W/2, H/2, W, H, 0x000011, 0.8).setDepth(50);
  scene.add.text(W/2, H/2 - 100, '⚡ STELLAR ASSAULT', { fontSize: '30px', fill: '#00ffcc', fontFamily: 'monospace', fontStyle: 'bold', align: 'center' }).setOrigin(0.5).setDepth(51);
  scene.add.text(W/2, H/2, 'Arrow Keys / WASD to move\nZ / Space to fire\nGamepad supported', { fontSize: '15px', fill: '#ffffff99', fontFamily: 'monospace', align: 'center', lineSpacing: 8 }).setOrigin(0.5).setDepth(51);
  scene.add.text(W/2, H*0.72, '[ TAP OR PRESS ANY KEY ]', { fontSize: '18px', fill: '#ffdd00', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(51);
  scene.input.keyboard.once('keydown', () => { overlay.destroy(); gameStarted = true; startWave(scene); });
  scene.input.once('pointerdown', () => { overlay.destroy(); gameStarted = true; startWave(scene); });
}

let rapidFire = false, tripleShot = false, rapidTimer = 0, tripleTimer = 0;

function fire(scene) {
  if (!ship || !ship.active) return;
  const b = bullets.create(ship.x, ship.y - 36, 'bullet');
  if (!b) return;
  b.setVelocityY(-600); b.body.allowGravity = false;
  scene.sound?.play?.('shoot', { volume: 0.1 }).catch?.(() => {});
  if (tripleShot) {
    const b2 = bullets.create(ship.x - 16, ship.y - 24, 'bullet');
    const b3 = bullets.create(ship.x + 16, ship.y - 24, 'bullet');
    if (b2) { b2.setVelocityX(-100); b2.setVelocityY(-550); b2.body.allowGravity = false; }
    if (b3) { b3.setVelocityX(100); b3.setVelocityY(-550); b3.body.allowGravity = false; }
  }
}

function startWave(scene) {
  spawnWave(scene, level);
}

function spawnWave(scene, lvl) {
  const count = 5 + lvl * 2;
  const types = ['enemy1', 'enemy2', 'enemy3'];
  for (let i = 0; i < count; i++) {
    const type = types[Math.min(Math.floor(i / 3), 2)];
    const delay = i * 200;
    scene.time.delayedCall(delay, () => {
      const x = Phaser.Math.Between(30, W - 30);
      const e = enemies.create(x, -40, type);
      if (!e) return;
      e.setVelocityY(80 + lvl * 15);
      e.enemyType = type;
      e.hp = type === 'enemy3' ? 2 : 1;
      e.body.allowGravity = false;
      if (type !== 'enemy1') {
        scene.time.addEvent({ delay: 1000 + Math.random() * 2000, callback: () => {
          if (e.active && gameStarted && !gameOver) enemyFire(scene, e);
        }, loop: true });
      }
    });
  }

  // Boss every 5 levels
  if (lvl % 5 === 0 && !bossActive) spawnBoss(scene, lvl);
}

function spawnBoss(scene, lvl) {
  bossActive = true;
  const boss = enemies.create(W / 2, -80, 'boss');
  boss.setVelocityY(60);
  boss.hp = 20 + lvl * 5;
  boss.maxHp = boss.hp;
  boss.isBoss = true;
  boss.body.allowGravity = false;
  scene.tweens.add({ targets: boss, y: 120, duration: 2000, ease: 'Power2', onComplete: () => {
    boss.setVelocityY(0);
    scene.tweens.add({ targets: boss, x: W - 60, duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    scene.time.addEvent({ delay: 600, callback: () => { if (boss.active && !gameOver) enemyFire(scene, boss); }, loop: true });
  }});
}

function enemyFire(scene, e) {
  if (!e || !e.active || !ship || !ship.active) return;
  const b = enemyBullets.create(e.x, e.y + 20, 'ebullet');
  if (!b) return;
  const angle = Phaser.Math.Angle.Between(e.x, e.y, ship.x, ship.y);
  const speed = 200 + level * 10;
  b.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
  b.body.allowGravity = false;
}

let autoFireTimer = 0;
function update(t, dt) {
  if (!gameStarted) return;
  if (gameOver) {
    if (restartKey?.isDown || touchFire) restartGame(this);
    return;
  }

  // Gamepad
  const gp = navigator.getGamepads?.()[0];

  // Move ship
  const leftNow  = cursors.left.isDown  || this.input.keyboard.keys[65]?.isDown || touchLeft  || (gp && (gp.axes[0] < -0.3 || gp.buttons[14]?.pressed));
  const rightNow = cursors.right.isDown || this.input.keyboard.keys[68]?.isDown || touchRight || (gp && (gp.axes[0] > 0.3  || gp.buttons[15]?.pressed));

  if (leftNow)  ship.x = Math.max(24, ship.x - 5);
  if (rightNow) ship.x = Math.min(W - 24, ship.x + 5);

  // Shield display
  shieldBar.clear();
  if (shield > 0) {
    shieldBar.lineStyle(3, 0x00aaff, 0.7);
    shieldBar.strokeCircle(ship.x, ship.y, 34);
  }

  // Shield timer
  if (shield > 0) shield -= dt;

  // Clean offscreen
  bullets.getChildren().forEach(b => { if (b.y < -20) b.destroy(); });
  enemies.getChildren().forEach(e => { if (e.y > H + 60) { e.destroy(); combo = 0; } });
  enemyBullets.getChildren().forEach(b => { if (b.y > H + 20) b.destroy(); });

  // Bullet-enemy collision
  this.physics.overlap(bullets, enemies, (b, e) => {
    explode(this, e.x, e.y, e.isBoss ? 0xff4400 : 0xffaa00);
    b.destroy();
    e.hp = (e.hp || 1) - 1;
    if (e.hp <= 0) {
      if (e.isBoss) bossActive = false;
      e.destroy();
      const pts = e.isBoss ? 500 : (e.enemyType === 'enemy3' ? 30 : e.enemyType === 'enemy2' ? 20 : 10);
      combo++;
      score += pts * (combo > 3 ? 2 : 1);
      updateHUD(this);
      if (combo >= 3) showCombo(this, combo);
      // Chance to drop power-up
      if (Math.random() < 0.15) dropPowerup(this, e.x, e.y);
    } else {
      this.cameras.main.shake(80, 0.005);
    }
  });

  // Enemy-ship collision / enemy bullet-ship
  [enemies, enemyBullets].forEach(grp => {
    this.physics.overlap(grp, ship, (hitObj, _ship) => {
      if (shield > 0) { hitObj.destroy(); return; }
      hitObj.destroy();
      explode(this, ship.x, ship.y, 0xff0000);
      this.cameras.main.shake(200, 0.02);
      lives--;
      combo = 0;
      updateHUD(this);
      if (lives <= 0) endGame(this);
    });
  });

  // Power-up pickup
  this.physics.overlap(powerups, ship, (pu, _ship) => {
    const type = pu.puType;
    pu.destroy();
    if (type === 'shield') { shield = 5000; }
    if (type === 'rapid')  { rapidFire = true; rapidTimer = 5000; }
    if (type === 'triple') { tripleShot = true; tripleTimer = 7000; }
    if (type === 'bomb')   { bombAll(this); }
    showMessage(this, type.toUpperCase() + '!', 0x00ffff);
  });

  // Power-up timers
  if (rapidFire) { rapidTimer -= dt; if (rapidTimer <= 0) rapidFire = false; }
  if (tripleShot) { tripleTimer -= dt; if (tripleTimer <= 0) tripleShot = false; }

  // Next wave when enemies cleared
  if (enemies.countActive() === 0 && !bossActive) {
    level++;
    levelText.setText('LVL ' + level);
    this.time.delayedCall(1000, () => spawnWave(this, level));
  }
}

function dropPowerup(scene, x, y) {
  const types = ['shield', 'rapid', 'triple', 'bomb'];
  const type = types[Math.floor(Math.random() * types.length)];
  const pu = powerups.create(x, y, 'pu_' + type);
  if (!pu) return;
  pu.puType = type;
  pu.setVelocityY(80);
  pu.body.allowGravity = false;
  scene.tweens.add({ targets: pu, scaleX: 1.2, scaleY: 1.2, yoyo: true, repeat: -1, duration: 400 });
}

function bombAll(scene) {
  enemies.getChildren().forEach(e => {
    explode(scene, e.x, e.y, 0xffaa00);
    score += 20;
    e.destroy();
  });
  enemyBullets.clear(true, true);
  bossActive = false;
  updateHUD(scene);
  scene.cameras.main.flash(300, 255, 200, 0, false);
}

function explode(scene, x, y, color) {
  particles.setPosition(x, y);
  particles.setParticleColor([color, 0xffffff]);
  particles.explode(12, x, y);
}

function showCombo(scene, c) {
  comboText.setText(`COMBO x${c}!`);
  comboText.setAlpha(1);
  scene.tweens.add({ targets: comboText, alpha: 0, scaleX: 1.5, scaleY: 1.5, duration: 800, ease: 'Power2' });
}

function showMessage(scene, msg, color) {
  const t = scene.add.text(W / 2, H / 2, msg, { fontSize: '28px', fill: '#' + color.toString(16).padStart(6, '0'), fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5).setDepth(30);
  scene.tweens.add({ targets: t, y: H / 2 - 80, alpha: 0, duration: 1200, ease: 'Power2', onComplete: () => t.destroy() });
}

function updateHUD(scene) {
  scoreText.setText('SCORE ' + score.toLocaleString());
  livesText.setText('♥ '.repeat(lives));
}

function endGame(scene) {
  gameOver = true;
  scene.add.rectangle(W / 2, H / 2, W, H, 0x000011, 0.85).setDepth(50);
  scene.add.text(W / 2, H / 2 - 80, 'GAME OVER', { fontSize: '36px', fill: '#ff4444', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5).setDepth(51);
  scene.add.text(W / 2, H / 2 - 20, 'SCORE: ' + score.toLocaleString(), { fontSize: '24px', fill: '#00ffcc', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(51);
  scene.add.text(W / 2, H / 2 + 30, 'LEVEL: ' + level, { fontSize: '20px', fill: '#ffffff88', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(51);
  scene.add.text(W / 2, H / 2 + 90, '[ R / TAP TO RESTART ]', { fontSize: '16px', fill: '#ffdd00', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(51);
}

function restartGame(scene) {
  score = 0; lives = 3; level = 1; combo = 0; shield = 0;
  rapidFire = false; tripleShot = false; bossActive = false;
  gameOver = false; touchFire = false;
  scene.scene.restart();
}
</script>
</body>
</html>
