<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Tower Defense</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; overflow: hidden; font-family: monospace; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, COLS, ROWS, CELL;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const hud = 110;
  const avH = H - hud;
  CELL = Math.floor(Math.min(W / 20, avH / 12));
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(avH / CELL);
}
resize();
window.addEventListener('resize', () => { resize(); buildPath(); });

const C = {
  bg: '#050510',
  grid: '#0d0d20',
  gridLine: '#1a1a3a',
  path: '#1a1030',
  pathLine: '#2a1050',
  laser: { color: '#00f5ff', glow: '#00aaff', cost: 25, name: 'LASER', dmg: 8, rate: 0.3, range: 3.5, slow: false, area: 0 },
  cannon: { color: '#f59e0b', glow: '#ff8800', cost: 50, name: 'CANNON', dmg: 35, rate: 1.2, range: 2.5, slow: false, area: 1.2 },
  slow: { color: '#a78bfa', glow: '#7700ff', cost: 40, name: 'SLOW', dmg: 2, rate: 0.5, range: 2.8, slow: true, area: 0 },
  enemy: '#4ade80',
  enemyBoss: '#ff4444',
  gold: '#f59e0b',
  life: '#f87171',
  purple: '#7c3aed',
  white: '#e0e0ff',
};

const TOWER_TYPES = ['laser', 'cannon', 'slow'];

let grid = [], path = [], towers = [], enemies = [], bullets = [], particles = [];
let gold = 100, lives = 10, wave = 0, maxWaves = 10;
let selectedTower = 0;
let waveTimer = 0, waveDelay = 3, spawning = false, spawnQueue = [], spawnTimer = 0;
let state = 'start'; // start, playing, gameover, win
let score = 0;
let scanlineOff = 0;
const HS_KEY = 'towerDefenseHS';
let highScore = parseInt(localStorage.getItem(HS_KEY) || '0');

// Build S-curve path
function buildPath() {
  path = [];
  const mR = Math.min(ROWS - 2, 10);
  const mC = Math.min(COLS - 2, 18);

  // S-curve waypoints (as grid col,row fractions)
  const waypoints = [
    [0, Math.floor(mR * 0.15)],
    [Math.floor(mC * 0.3), Math.floor(mR * 0.15)],
    [Math.floor(mC * 0.3), Math.floor(mR * 0.5)],
    [Math.floor(mC * 0.6), Math.floor(mR * 0.5)],
    [Math.floor(mC * 0.6), Math.floor(mR * 0.82)],
    [mC, Math.floor(mR * 0.82)],
  ];

  for (let w = 0; w < waypoints.length - 1; w++) {
    const [x1, y1] = waypoints[w];
    const [x2, y2] = waypoints[w + 1];
    const dx = Math.sign(x2 - x1), dy = Math.sign(y2 - y1);
    let x = x1, y = y1;
    while (x !== x2 || y !== y2) {
      path.push({ col: x, row: y });
      if (x !== x2) x += dx;
      else if (y !== y2) y += dy;
    }
  }
  path.push({ col: waypoints[waypoints.length - 1][0], row: waypoints[waypoints.length - 1][1] });

  // Mark grid cells
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = { tower: null, isPath: false };
    }
  }
  for (const p of path) {
    if (p.row >= 0 && p.row < ROWS && p.col >= 0 && p.col < COLS) {
      grid[p.row][p.col].isPath = true;
    }
  }
}

function cellCenter(col, row) {
  return { x: col * CELL + CELL / 2, y: row * CELL + CELL / 2 + 110 };
}

function startGame() {
  buildPath();
  towers = []; enemies = []; bullets = []; particles = [];
  gold = 100; lives = 10; wave = 0; score = 0;
  waveTimer = 2; spawning = false; spawnQueue = [];
  state = 'playing';
  startWave();
}

function startWave() {
  wave++;
  if (wave > maxWaves) return;
  const count = 5 + wave * 2;
  const hpBase = 80 + wave * 15;
  spawnQueue = [];
  for (let i = 0; i < count; i++) {
    const isBoss = i === Math.floor(count / 2) && wave >= 3;
    spawnQueue.push({
      hp: Math.round(hpBase * (isBoss ? 3 : 1) * Math.pow(1.15, wave - 1)),
      speed: (isBoss ? 0.6 : 1.0) + wave * 0.05,
      boss: isBoss,
      delay: i * 0.9
    });
  }
  spawnTimer = 0;
  spawning = true;
}

function spawnEnemy(proto) {
  const startP = path[0];
  const { x, y } = cellCenter(startP.col, startP.row);
  enemies.push({
    x, y,
    pathIdx: 0,
    hp: proto.hp, maxHp: proto.hp,
    speed: proto.speed * CELL * 0.9,
    boss: proto.boss,
    slow: 0,
    id: Math.random()
  });
}

function glowText(text, x, y, size, color, align = 'center') {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align;
  ctx.shadowColor = color;
  ctx.shadowBlur = 16;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function drawGrid() {
  // Background
  ctx.fillStyle = C.grid;
  ctx.fillRect(0, 110, W, H - 110);

  // Grid lines
  ctx.strokeStyle = C.gridLine;
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, 110 + r * CELL);
    ctx.lineTo(W, 110 + r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL, 110);
    ctx.lineTo(c * CELL, H);
    ctx.stroke();
  }

  // Path cells
  for (const p of path) {
    if (p.row < 0 || p.row >= ROWS || p.col < 0 || p.col >= COLS) continue;
    ctx.fillStyle = C.path;
    ctx.fillRect(p.col * CELL + 1, 110 + p.row * CELL + 1, CELL - 2, CELL - 2);
  }

  // Path highlight lines
  if (path.length > 1) {
    ctx.beginPath();
    const { x: sx, y: sy } = cellCenter(path[0].col, path[0].row);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < path.length; i++) {
      const { x, y } = cellCenter(path[i].col, path[i].row);
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = C.pathLine;
    ctx.lineWidth = CELL * 0.3;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Arrow dashes
    ctx.strokeStyle = '#3a1060';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Start/end markers
  if (path.length > 0) {
    const s = cellCenter(path[0].col, path[0].row);
    const e = cellCenter(path[path.length-1].col, path[path.length-1].row);
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
    ctx.fillRect(s.x - 6, s.y - 6, 12, 12);
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.fillRect(e.x - 6, e.y - 6, 12, 12);
    ctx.shadowBlur = 0;
  }
}

function drawTowers() {
  for (const t of towers) {
    const { x, y } = cellCenter(t.col, t.row);
    const cfg = C[t.type];
    const sz = CELL * 0.42;

    // Range circle (faint)
    if (t === towers[towers.length - 1]) { // hover effect last placed
      ctx.strokeStyle = cfg.color + '30';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, cfg.range * CELL, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Tower body
    ctx.shadowColor = cfg.glow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = cfg.color;

    if (t.type === 'laser') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(x, y - sz);
      ctx.lineTo(x + sz, y);
      ctx.lineTo(x, y + sz);
      ctx.lineTo(x - sz, y);
      ctx.closePath();
      ctx.fill();
    } else if (t.type === 'cannon') {
      // Circle with barrel
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI * 2);
      ctx.fill();
      // Barrel (rotates toward last target direction)
      const angle = t.angle || 0;
      ctx.strokeStyle = cfg.color;
      ctx.lineWidth = sz * 0.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(angle) * sz * 1.5, y + Math.sin(angle) * sz * 1.5);
      ctx.stroke();
    } else {
      // Slow — hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const px = x + Math.cos(a) * sz;
        const py = y + Math.sin(a) * sz;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }

    // Cooldown indicator
    if (t.cooldown > 0) {
      const frac = t.cooldown / C[t.type].rate;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.arc(x, y, sz * 0.6, -Math.PI/2, -Math.PI/2 + frac * Math.PI * 2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }
}

function drawEnemies() {
  for (const e of enemies) {
    const sz = e.boss ? CELL * 0.45 : CELL * 0.3;
    const col = e.boss ? C.enemyBoss : C.enemy;

    // Slow effect
    if (e.slow > 0) {
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, sz + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.shadowColor = col;
    ctx.shadowBlur = 10;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(e.x, e.y, sz, 0, Math.PI * 2);
    ctx.fill();

    // Boss star
    if (e.boss) {
      ctx.fillStyle = '#ffdd00';
      ctx.font = `${CELL * 0.3}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('★', e.x, e.y + CELL * 0.1);
    }
    ctx.shadowBlur = 0;

    // HP bar
    const bw = sz * 2.5, bh = 4;
    const bx = e.x - bw / 2, by = e.y - sz - 8;
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by, bw, bh);
    const pct = e.hp / e.maxHp;
    ctx.fillStyle = pct > 0.5 ? C.enemy : pct > 0.25 ? '#ffdd00' : C.enemyBoss;
    ctx.fillRect(bx, by, bw * pct, bh);
  }
}

function drawBullets() {
  for (const b of bullets) {
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = b.color;
    if (b.type === 'laser') {
      ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
    } else if (b.type === 'cannon') {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 2.5 + 0.5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color, size: Math.random()*5+2 });
  }
}

function drawHUD() {
  // HUD bar
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, 110);
  ctx.strokeStyle = '#2a2a5e';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, W, 110);

  // Lives
  glowText(`❤️ ${lives}`, 60, 36, 18, C.life, 'center');
  // Gold
  glowText(`💰 ${gold}`, 60, 68, 16, C.gold, 'center');
  // Wave
  glowText(`WAVE ${wave}/${maxWaves}`, W/2, 36, 22, '#a78bfa', 'center');
  // Score
  glowText(`SCORE: ${score}`, W/2, 68, 14, C.white, 'center');

  // Tower buttons
  const btns = [
    { type: 'laser', key: '1', label: 'LASER 25g', color: C.laser.color },
    { type: 'cannon', key: '2', label: 'CANNON 50g', color: C.cannon.color },
    { type: 'slow', key: '3', label: 'SLOW 40g', color: C.slow.color },
  ];
  const btnW = 120, btnH = 36, gap = 8;
  const totalW = btns.length * (btnW + gap);
  const startX = W - totalW - 10;

  btns.forEach((b, i) => {
    const bx = startX + i * (btnW + gap);
    const by = 8;
    const isSelected = TOWER_TYPES[selectedTower] === b.type;

    ctx.fillStyle = isSelected ? b.color + '44' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by, btnW, btnH);
    ctx.strokeStyle = isSelected ? b.color : '#333';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.strokeRect(bx, by, btnW, btnH);
    glowText(`[${b.key}] ${b.label}`, bx + btnW/2, by + 23, 11, isSelected ? b.color : '#777', 'center');

    // Second row
    const by2 = 52;
    ctx.fillStyle = isSelected ? b.color + '44' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by2, btnW, btnH);
    ctx.strokeStyle = isSelected ? b.color : '#333';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.strokeRect(bx, by2, btnW, btnH);
    const cfg = C[b.type];
    glowText(`DMG:${cfg.dmg} RNG:${cfg.range}`, bx + btnW/2, by2 + 23, 10, '#666', 'center');
  });

  // Wave status
  if (!spawning && wave < maxWaves && enemies.length === 0) {
    glowText(`NEXT WAVE IN ${Math.ceil(waveTimer)}s`, W/2, 95, 13, '#4ade80', 'center');
  } else if (spawning) {
    glowText(`WAVE ${wave} IN PROGRESS`, W/2, 95, 13, '#f59e0b', 'center');
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hp <= 0) {
      const reward = e.boss ? 20 : 8;
      gold += reward;
      score += e.boss ? 50 : 10;
      if (score > highScore) { highScore = score; localStorage.setItem(HS_KEY, highScore); }
      spawnParticle(e.x, e.y, e.boss ? C.enemyBoss : C.enemy);
      enemies.splice(i, 1);
      continue;
    }

    if (e.slow > 0) e.slow -= dt;
    const spd = e.slow > 0 ? e.speed * 0.35 : e.speed;

    if (e.pathIdx >= path.length - 1) {
      // Reached end
      lives--;
      spawnParticle(e.x, e.y, C.life);
      enemies.splice(i, 1);
      if (lives <= 0) { state = 'gameover'; }
      continue;
    }

    const target = cellCenter(path[e.pathIdx + 1].col, path[e.pathIdx + 1].row);
    const dx = target.x - e.x;
    const dy = target.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < spd * dt + 2) {
      e.x = target.x;
      e.y = target.y;
      e.pathIdx++;
    } else {
      e.x += (dx / dist) * spd * dt;
      e.y += (dy / dist) * spd * dt;
    }
  }
}

function updateTowers(dt) {
  for (const t of towers) {
    if (t.cooldown > 0) { t.cooldown -= dt; continue; }
    const cfg = C[t.type];
    // Find nearest enemy in range
    let nearest = null, nearDist = Infinity;
    for (const e of enemies) {
      const { x, y } = cellCenter(t.col, t.row);
      const dx = e.x - x, dy = e.y - y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d <= cfg.range * CELL && d < nearDist) { nearest = e; nearDist = d; }
    }
    if (!nearest) continue;

    const { x: tx, y: ty } = cellCenter(t.col, t.row);
    t.angle = Math.atan2(nearest.y - ty, nearest.x - tx);
    t.cooldown = cfg.rate;

    if (t.type === 'slow') {
      nearest.slow = 2.5;
      nearest.hp -= cfg.dmg;
      spawnParticle(nearest.x, nearest.y, '#a78bfa');
    } else if (t.type === 'cannon') {
      bullets.push({ x: tx, y: ty, tx: nearest.x, ty: nearest.y, target: nearest, type: 'cannon', speed: 300, color: cfg.color, dmg: cfg.dmg, area: cfg.area });
    } else {
      bullets.push({ x: tx, y: ty, target: nearest, type: 'laser', speed: 600, color: cfg.color, dmg: cfg.dmg, area: 0 });
    }
  }
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    const te = b.target;

    if (!enemies.includes(te) || te.hp <= 0) {
      bullets.splice(i, 1);
      continue;
    }

    const dx = te.x - b.x, dy = te.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const step = b.speed * dt;

    if (dist <= step + 2) {
      // Hit!
      if (b.area > 0) {
        // Area splash
        for (const e of enemies) {
          const ex = e.x - te.x, ey = e.y - te.y;
          if (Math.sqrt(ex*ex + ey*ey) <= b.area * CELL) {
            e.hp -= b.dmg;
            spawnParticle(e.x, e.y, '#f59e0b');
          }
        }
      } else {
        te.hp -= b.dmg;
        spawnParticle(te.x, te.y, b.color);
      }
      bullets.splice(i, 1);
    } else {
      b.x += (dx / dist) * step;
      b.y += (dy / dist) * step;
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawStart() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);
  glowText('NEON TOWER DEFENSE', W/2, H*0.22, Math.min(52, W/12), '#7c3aed');
  glowText('Survive 10 waves of neon enemies!', W/2, H*0.33, 18, C.white);

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(W/2 - 240, H*0.4, 480, 200);
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 240, H*0.4, 480, 200);

  glowText('[1] LASER  — 25g  Fast, single target', W/2, H*0.4+34, 14, C.laser.color);
  glowText('[2] CANNON — 50g  Slow, area damage', W/2, H*0.4+60, 14, C.cannon.color);
  glowText('[3] SLOW   — 40g  Freezes enemies', W/2, H*0.4+86, 14, C.slow.color);
  glowText('Click/tap empty cells to place towers', W/2, H*0.4+116, 13, '#888');
  glowText(`BEST: ${highScore} pts`, W/2, H*0.4+144, 14, C.gold);
  glowText(`Lives: 10  |  Start gold: 100g`, W/2, H*0.4+170, 13, C.life);

  if (Math.floor(performance.now() / 500) % 2 === 0) {
    glowText('[ PRESS ENTER OR TAP TO START ]', W/2, H*0.72, 20, '#7c3aed');
  }
  drawScanlines();
}

function drawGameOver(win) {
  ctx.fillStyle = 'rgba(5,5,16,0.92)';
  ctx.fillRect(0, 0, W, H);
  glowText(win ? 'VICTORY!' : 'GAME OVER', W/2, H*0.28, Math.min(52, W/12), win ? C.gold : C.life);

  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(W/2 - 180, H*0.38, 360, 140);
  ctx.strokeStyle = win ? C.gold : C.life;
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 180, H*0.38, 360, 140);

  glowText(`Score: ${score}`, W/2, H*0.38+40, 28, C.white);
  glowText(`Wave: ${wave}/${maxWaves}`, W/2, H*0.38+72, 18, C.white);
  glowText(`Best: ${highScore}`, W/2, H*0.38+100, 16, C.gold);

  const bx = W/2-120, by = H*0.65, bw = 240, bh = 48;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  glowText('PLAY AGAIN  [R]', W/2, by + 32, 20, '#a78bfa');
  drawScanlines();
}

function drawScanlines() {
  scanlineOff = (scanlineOff + 1) % 4;
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = scanlineOff; y < H; y += 4) ctx.fillRect(0, y, W, 1);
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

let lastFrame = 0;
function loop(ts) {
  const dt = Math.min((ts - lastFrame) / 1000, 0.05);
  lastFrame = ts;

  if (state === 'start') { drawStart(); requestAnimationFrame(loop); return; }
  if (state === 'gameover') { drawGameOver(false); requestAnimationFrame(loop); return; }
  if (state === 'win') { drawGameOver(true); requestAnimationFrame(loop); return; }

  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawTowers();
  drawEnemies();
  drawBullets();
  drawParticles();
  drawHUD();
  drawScanlines();

  // Spawn logic
  if (spawning) {
    spawnTimer += dt;
    for (let i = spawnQueue.length - 1; i >= 0; i--) {
      if (spawnQueue[i].delay <= spawnTimer) {
        spawnEnemy(spawnQueue[i]);
        spawnQueue.splice(i, 1);
      }
    }
    if (spawnQueue.length === 0) spawning = false;
  } else if (enemies.length === 0 && state === 'playing') {
    if (wave >= maxWaves) { state = 'win'; }
    else {
      waveTimer -= dt;
      if (waveTimer <= 0) { waveTimer = 3; startWave(); }
    }
  }

  updateEnemies(dt);
  updateTowers(dt);
  updateBullets(dt);
  updateParticles(dt);

  requestAnimationFrame(loop);
}

// Input
function placeTower(mx, my) {
  if (state !== 'playing') return;
  if (my < 110) return; // HUD area

  const col = Math.floor(mx / CELL);
  const row = Math.floor((my - 110) / CELL);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
  if (grid[row][col].isPath || grid[row][col].tower) return;

  const type = TOWER_TYPES[selectedTower];
  const cfg = C[type];
  if (gold < cfg.cost) return;

  grid[row][col].tower = type;
  towers.push({ col, row, type, cooldown: 0, angle: 0 });
  gold -= cfg.cost;
}

function handleHUDClick(mx, my) {
  if (my > 110) return false;
  const btnW = 120, btnH = 36, gap = 8;
  const totalW = 3 * (btnW + gap);
  const startX = W - totalW - 10;
  for (let i = 0; i < 3; i++) {
    const bx = startX + i * (btnW + gap);
    if (mx >= bx && mx <= bx + btnW && ((my >= 8 && my <= 44) || (my >= 52 && my <= 88))) {
      selectedTower = i;
      return true;
    }
  }
  return false;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (state === 'start') { startGame(); return; }
  if (state === 'gameover' || state === 'win') {
    const bx = W/2-120, by = H*0.65, bw = 240, bh = 48;
    if (mx >= bx && mx <= bx+bw && my >= by && my <= by+bh) startGame();
    return;
  }
  if (!handleHUDClick(mx, my)) placeTower(mx, my);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;

  if (state === 'start') { startGame(); return; }
  if (state === 'gameover' || state === 'win') { startGame(); return; }
  if (!handleHUDClick(mx, my)) placeTower(mx, my);
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.key === '1') selectedTower = 0;
  if (e.key === '2') selectedTower = 1;
  if (e.key === '3') selectedTower = 2;
  if (e.key === 'r' || e.key === 'R') { if (state !== 'playing') startGame(); }
  if (e.key === 'Enter' && state === 'start') startGame();
  if (e.key === 'Enter' && (state === 'gameover' || state === 'win')) startGame();
});

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'GAMEPAD_KEY') {
    const ev = new KeyboardEvent(e.data.down ? 'keydown' : 'keyup', { key: e.data.key, bubbles: true });
    window.dispatchEvent(ev);
  }
});

buildPath();
requestAnimationFrame(loop);
</script>
