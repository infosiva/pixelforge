<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>*{margin:0;padding:0}body{background:#0a0a1a;overflow:hidden}</style></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W=800,H=500;
const config={type:Phaser.AUTO,width:W,height:H,backgroundColor:'#030712',
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:{preload,create,update}};
const game=new Phaser.Game(config);

let ship,bullets,enemies,enemyBullets,score,lives,wave,sc,lv,wv,alive,cursors,fireKey;
let lastFire=0,lastGpFire=false,stars;

function preload(){}

function makeTex(scene){
  // Player ship
  let g=scene.make.graphics({add:false});
  g.fillStyle(0x7c3aed);g.fillTriangle(16,0,32,36,0,36);
  g.fillStyle(0xa78bfa);g.fillTriangle(16,4,26,30,6,30);
  g.fillStyle(0x00ffff,0.6);g.fillRect(6,32,8,6);g.fillRect(18,32,8,6);// engine glow
  g.generateTexture('ship',32,40);g.destroy();
  // Bullet
  g=scene.make.graphics({add:false});
  g.fillStyle(0xfbbf24);g.fillRect(0,0,4,14);
  g.generateTexture('bullet',4,14);g.destroy();
  // Enemy bullet
  g=scene.make.graphics({add:false});
  g.fillStyle(0xef4444);g.fillCircle(4,4,4);
  g.generateTexture('ebullet',8,8);g.destroy();
  // Enemy types
  [[0xef4444,'basic'],[0xf97316,'fast'],[0xec4899,'tank']].forEach(([c,n])=>{
    g=scene.make.graphics({add:false});
    g.fillStyle(c);g.fillTriangle(16,36,32,0,0,0);// inverted triangle
    g.fillStyle(c,0.5);g.fillRect(4,8,10,14);g.fillRect(18,8,10,14);// wings
    g.generateTexture('e_'+n,32,40);g.destroy();
  });
  // Powerup
  g=scene.make.graphics({add:false});
  g.fillStyle(0x22c55e);g.fillStar(12,12,5,12,6);
  g.generateTexture('powerup',24,24);g.destroy();
}

function create(){
  makeTex(this);
  alive=true;score=0;lives=3;wave=0;
  // Scrolling starfield
  stars=[];
  const bg=this.add.graphics();
  for(let i=0;i<200;i++){
    const x=Math.random()*W,y=Math.random()*H,s=Math.random()<0.2?2:1;
    stars.push({x,y,speed:1+Math.random()*2,g:bg});
    bg.fillStyle(0xffffff,Math.random()*0.7+0.3);bg.fillRect(x,y,s,s);
  }

  ship=this.physics.add.image(W/2,H-60,'ship').setDepth(5);
  ship.body.allowGravity=false;ship.setCollideWorldBounds(true);

  bullets=this.physics.add.group();
  enemies=this.physics.add.group();
  enemyBullets=this.physics.add.group();

  cursors=this.input.keyboard.createCursorKeys();
  fireKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
  this.input.keyboard.addKey('R').on('down',()=>{if(!alive)this.scene.restart();});

  sc=this.add.text(8,8,'Score: 0',{color:'#a78bfa',fontSize:'15px',fontFamily:'monospace',fontStyle:'bold'}).setDepth(10);
  lv=this.add.text(W-8,8,'♥♥♥',{color:'#ef4444',fontSize:'15px',fontFamily:'monospace'}).setOrigin(1,0).setDepth(10);
  wv=this.add.text(W/2,8,'Wave 1',{color:'#fbbf24',fontSize:'14px',fontFamily:'monospace'}).setOrigin(0.5,0).setDepth(10);

  // Touch controls
  this.input.on('pointermove',p=>{if(p.isDown)ship.x=Phaser.Math.Clamp(p.x,20,W-20);});

  spawnWave.call(this);
}

function spawnWave(){
  wave++;wv.setText('Wave '+wave);
  const types=['basic','basic','fast','tank'];
  const count=4+wave*2;
  for(let i=0;i<count;i++){
    const type=types[Math.min(Math.floor(Math.random()*(Math.min(wave,4))),3)];
    const x=60+Math.random()*(W-120);
    const y=-40-i*50;
    const e=this.physics.add.image(x,y,'e_'+type).setDepth(3);
    e.body.allowGravity=false;
    e.setData('type',type);
    e.setData('hp',type==='tank'?3:1);
    e.setData('vy',type==='fast'?100+wave*10:60+wave*5);
    e.setData('fireRate',Phaser.Math.Between(1500,3000));
    e.setData('nextFire',this.time.now+Phaser.Math.Between(500,2000));
    enemies.add(e);
  }
}

function update(t,dt){
  if(!alive)return;
  const gp=navigator.getGamepads?.()?.[0];
  const left=(cursors.left.isDown)||(gp&&(gp.axes[0]<-0.5||gp.buttons[14]?.pressed));
  const right=(cursors.right.isDown)||(gp&&(gp.axes[0]>0.5||gp.buttons[15]?.pressed));
  const up=(cursors.up.isDown)||(gp&&(gp.axes[1]<-0.5||gp.buttons[12]?.pressed));
  const down=(cursors.down.isDown)||(gp&&(gp.axes[1]>0.5||gp.buttons[13]?.pressed));
  const fire=(Phaser.Input.Keyboard.JustDown(fireKey))||(gp&&gp.buttons[0]?.pressed&&!lastGpFire);
  lastGpFire=gp?.buttons[0]?.pressed;

  const spd=220;
  ship.setVelocity((left?-spd:right?spd:0),(up?-spd:down?spd:0));

  // Fire
  if(fire||t-lastFire>180){
    if(t-lastFire>180){
      lastFire=t;
      const b=this.physics.add.image(ship.x,ship.y-24,'bullet').setDepth(4).setTint(0xfbbf24);
      b.body.allowGravity=false;b.setVelocityY(-500);
      bullets.add(b);
      this.time.delayedCall(1200,()=>{if(b.active)b.destroy();});
    }
  }

  // Enemy movement + AI fire
  enemies.getChildren().forEach(e=>{
    if(!e.active)return;
    e.y+=e.getData('vy')*dt/1000;
    e.x+=Math.sin(t*0.001+e.x)*0.5;
    if(e.y>H+60){e.destroy();}
    // Enemy fire
    if(t>e.getData('nextFire')){
      e.setData('nextFire',t+e.getData('fireRate'));
      const eb=this.physics.add.image(e.x,e.y+20,'ebullet').setDepth(3);
      eb.body.allowGravity=false;
      const angle=Phaser.Math.Angle.Between(e.x,e.y,ship.x,ship.y);
      eb.setVelocity(Math.cos(angle)*200,Math.sin(angle)*200);
      enemyBullets.add(eb);
      this.time.delayedCall(2000,()=>{if(eb.active)eb.destroy();});
    }
  });

  if(enemies.countActive()===0)spawnWave.call(this);

  // Bullet hits enemy
  this.physics.overlap(bullets,enemies,(b,e)=>{
    b.destroy();
    const hp=e.getData('hp')-1;
    if(hp<=0){
      spawnExplosion.call(this,e.x,e.y);
      e.destroy();
      score+=e.getData('type')==='tank'?30:e.getData('type')==='fast'?15:10;
      sc.setText('Score: '+score);
      window.parent.postMessage({type:'GAME_SCORE',score},'*');
    } else e.setData('hp',hp);
  });

  // Enemy bullet hits ship
  this.physics.overlap(enemyBullets,ship,(eb)=>{
    eb.destroy();
    lives--;lv.setText('♥'.repeat(Math.max(0,lives)));
    this.cameras.main.shake(200,0.01);
    if(lives<=0){alive=false;ship.destroy();
      this.add.text(W/2,H/2-30,'GAME OVER',{color:'#ef4444',fontSize:'52px',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
      this.add.text(W/2,H/2+30,'Score: '+score+'   Press R to restart',{color:'rgba(255,255,255,0.5)',fontSize:'18px',fontFamily:'monospace'}).setOrigin(0.5).setDepth(20);
    }
  });

  // Enemy reaches bottom
  this.physics.overlap(enemies,ship,(e)=>{
    lives=0;lv.setText('');alive=false;ship.destroy();
    this.add.text(W/2,H/2-30,'GAME OVER',{color:'#ef4444',fontSize:'52px',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
    this.add.text(W/2,H/2+30,'Score: '+score+'   Press R to restart',{color:'rgba(255,255,255,0.5)',fontSize:'18px',fontFamily:'monospace'}).setOrigin(0.5).setDepth(20);
  });
}

function spawnExplosion(x,y){
  const g=this.add.graphics().setDepth(6);
  const pts=Array.from({length:12},()=>({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:25,c:Math.random()<0.5?0xfbbf24:0xef4444}));
  let t=0;
  const id=this.time.addEvent({delay:16,repeat:25,callback:()=>{
    g.clear();
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;g.fillStyle(p.c,p.life/25);g.fillCircle(p.x,p.y,3);});
    if(t++>25){g.destroy();id.remove();}
  }});
}
</script>
</body></html>
